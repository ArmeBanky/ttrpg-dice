  },

  _caUpdateSkillInfo(char,wi){
    const w=(char.coc.weapons||[])[wi];
    const el=document.getElementById('caSkillInfo');
    if(!el||!w)return;
    const val=getCombatSkillVal(char,w.skill);
    const hard=fl(val/2),ext=fl(val/5);
    const barColor=val<=30?'#e74c3c':val<=60?'#f39c12':'#2ecc71';
    el.innerHTML=`
      <div class="ca-skill-row">
        <span class="ca-skill-name-lbl">${esc(w.skill)}</span>
        <span class="ca-skill-pct">${val}%</span>
        ${w.penetrating?'<span class="ca-penetrate">✦ 贯穿</span>':''}
      </div>
      <div class="ca-skill-bar-wrap">
        <div class="ca-skill-bar-fill" style="width:${Math.min(val,100)}%;background:${barColor}"></div>
      </div>
      <div class="ca-thresh-row">
        <span class="ca-thresh-badge">½ ${hard}</span>
        <span class="ca-thresh-badge">⅕ ${ext}</span>
        ${w.range?`<span class="ca-thresh-badge" style="border-color:transparent;background:transparent;color:var(--dim)">射程 ${esc(w.range)}</span>`:''}
      </div>`;
  },

  _caRenderDmg(char,wi,editMode,tempDmg){
    const w=(char.coc.weapons||[])[wi];
    const el=document.getElementById('caDmgSection');
    if(!el||!w)return;
    if(!w.dmg)w.dmg=emptyWeaponDmg();
    const dmg=tempDmg||w.dmg;

    const DIE_CLS={d3:'die-d3',d4:'die-d4',d6:'die-d6',d8:'die-d8',d10:'die-d10',d12:'die-d12',d20:'die-d20'};

    // Mini die entry for view mode
    const miniDieEntry=(k,cnt,half)=>`
      <div class="ca-mini-die-entry">
        <div class="ca-mini-die-wrap${half?' half':''}">
          <div class="die-shape ${DIE_CLS[k]||'die-d6'}"><div class="die-inner">${DMG_DIE_LABELS[k]}</div></div>
          ${half?'<span class="ca-db-half-mark">½</span>':''}
        </div>
        <span class="ca-mini-die-count">×${cnt}</span>
      </div>`;

    // Interactive die slot for edit mode
    const editDieSlot=(zone,pool)=>DMG_DIE_KEYS.map(k=>{
      const cnt=pool[k]||0;
      return`<div class="ca-die-slot" data-zone="${zone}" data-die="${k}" style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <div class="ca-mini-die-wrap ca-ds" title="点击 +1 ${DMG_DIE_LABELS[k]}">
          <div class="die-shape ${DIE_CLS[k]||'die-d6'}"><div class="die-inner">${DMG_DIE_LABELS[k]}</div></div>
        </div>
        <div class="ca-cnt-row">
          <button class="ca-dminus" data-zone="${zone}" data-die="${k}">−</button>
          <span class="ca-cnt-num" id="caCnt_${zone}_${k}">${cnt}</span>
          <button class="ca-dplus" data-zone="${zone}" data-die="${k}">+</button>
        </div>
      </div>`;
    }).join('');

    const multOpts=(m)=>[0.5,1,1.5].map(v=>{
      const lbl=v===0.5?'×½':v===1?'×1':'×1½';
      return`<span class="ca-mult-opt${m===v?' active':''}" data-mult="${v}">${lbl}</span>`;
    }).join('');

    if(!editMode){
      const fix=dmg.fixedBonus||0;
      const fixColor=fix>0?'var(--gold-bright)':fix<0?'var(--red)':'var(--dim)';
      const fixStr=fix>0?`+${fix}`:String(fix);
      const dbHasAny=DMG_DIE_KEYS.some(k=>(dmg.dbDice[k]||0)>0);
      const isHalf=dmg.dbMult===0.5;
      const savedMark=dmg.saved;

      const baseSectionContent=savedMark&&DMG_DIE_KEYS.some(k=>(dmg.baseDice[k]||0)>0)
        ?DMG_DIE_KEYS.filter(k=>(dmg.baseDice[k]||0)>0).map(k=>miniDieEntry(k,dmg.baseDice[k],false)).join('')
        :`<span class="ca-db-zero">${savedMark?'— 无 —':'未配置'}</span>`;

      const dbSectionContent=savedMark?
        (dbHasAny?`
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
              ${DMG_DIE_KEYS.filter(k=>(dmg.dbDice[k]||0)>0).map(k=>miniDieEntry(k,dmg.dbDice[k],isHalf)).join('')}
            </div>
            <div class="ca-db-toggler">
              <span class="ca-db-toggle-opt${dmg.dbMult===1?' active':''}" data-dbmult="1">完整</span>
              <span class="ca-db-toggle-opt${isHalf?' active':''}" data-dbmult="0.5">半骰</span>
              ${dmg.dbMult===1.5?'<span class="ca-db-toggle-opt active" data-dbmult="1.5">×1½</span>':''}
            </div>
          </div>`
        :`<span class="ca-db-zero">DB +0</span>`)
      :`<span class="ca-db-zero">未配置</span>`;

      el.innerHTML=`<div class="ca-dmg-panel">
        <div class="ca-dmg-panel-hdr">
          <span class="ca-dmg-panel-title">⚔ 伤害配置</span>
          <button class="ca-icon-btn" id="caDmgEditBtn">✎</button>
        </div>
        <div class="ca-dmg-sec">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">基础</span></div>
          <div class="ca-dmg-content">${baseSectionContent}</div>
        </div>
        <div class="ca-dmg-sec">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">DB</span></div>
          <div class="ca-dmg-content">${dbSectionContent}</div>
        </div>
        <div class="ca-dmg-sec-fix">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">固定</span></div>
          <div class="ca-dmg-content">
            <div class="ca-fix-view-wrap" id="caFixViewWrap" title="点击编辑固定加值">
              <span class="ca-fix-num" id="caFixDisplay" style="color:${fixColor}">${fixStr}</span>
              <span class="ca-fix-pencil">✎</span>
            </div>
          </div>
        </div>
        <div class="ca-dmg-summary">
          <span class="ca-summary-lbl">总计：</span>
          <span class="ca-summary-expr" id="caDmgSummary">${savedMark?buildDmgPreview(dmg):'—'}</span>
        </div>
      </div>`;

      // Pencil → edit mode (both header button and fix-view-wrap click)
      const _enterEdit=()=>this._caRenderDmg(char,wi,true,JSON.parse(JSON.stringify(w.dmg)));
      document.getElementById('caDmgEditBtn')?.addEventListener('click',_enterEdit);
      document.getElementById('caFixViewWrap')?.addEventListener('click',_enterEdit);
      // DB mult toggle
      el.querySelectorAll('[data-dbmult]').forEach(opt=>{
        opt.addEventListener('click',()=>{w.dmg.dbMult=parseFloat(opt.dataset.dbmult);this.save();this._caRenderDmg(char,wi,false,null);});
      });
    }else{
      const d=dmg;
      el.innerHTML=`<div class="ca-dmg-panel">
        <div class="ca-dmg-panel-hdr">
          <span class="ca-dmg-panel-title">✎ 编辑伤害配置</span>
          <button class="ca-icon-btn" id="caSaveBtn" style="color:var(--green)" title="保存">✓ 保存</button>
          <button class="ca-icon-btn" id="caCancelBtn" title="取消">✗</button>
        </div>
        <div style="padding:5px 12px;font-size:10px;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.05)">💡 点击骰子 +1，± 微调，或从骰子台拖入</div>
        <div class="ca-dmg-sec" style="min-height:110px">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">基础</span></div>
          <div class="ca-dmg-content ca-pool-drop" id="caBaseDrop" style="flex-wrap:wrap;align-items:center;gap:6px;justify-content:flex-start;padding:10px">
            ${editDieSlot('base',d.baseDice)}
          </div>
        </div>
        <div class="ca-dmg-sec" style="min-height:110px">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">DB</span></div>
          <div class="ca-dmg-content" style="flex-direction:column;align-items:flex-start;padding:8px 10px;gap:8px">
            <div class="ca-pool-drop" id="caDbDrop" style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:50px;width:100%;padding:4px 0">
              ${editDieSlot('db',d.dbDice)}
            </div>
            <div class="ca-mult-opts" style="display:flex;gap:4px">${multOpts(d.dbMult)}</div>
          </div>
        </div>
        <div class="ca-dmg-sec-fix">
          <div class="ca-dmg-lbl-col"><span class="ca-dmg-lbl">固定</span></div>
          <div class="ca-dmg-content">
            <div class="ca-fix-ctrl">
              <button class="ca-fix-btn" id="caFixMinusEdit">−</button>
              <span class="ca-fix-num" id="caFixedBonus" style="color:${(d.fixedBonus||0)>0?'var(--gold-bright)':(d.fixedBonus||0)<0?'var(--red)':'var(--dim)'}">${(d.fixedBonus||0)>0?'+'+(d.fixedBonus||0):String(d.fixedBonus||0)}</span>
              <button class="ca-fix-btn" id="caFixPlusEdit">+</button>
            </div>
          </div>
        </div>
        <div class="ca-dmg-summary">
          <span class="ca-summary-lbl">保存后生效</span>
        </div>
      </div>`;
      this._caBindDmgEdit(char,wi,d);
    }
  },

  _caBindDmgEdit(char,wi,dmg){
    const el=document.getElementById('caDmgSection');
    // Click die = +1
    el.querySelectorAll('.ca-die-slot').forEach(slot=>{
      slot.querySelector('.ca-ds')?.addEventListener('click',()=>{
        const zone=slot.dataset.zone,k=slot.dataset.die;
        const pool=zone==='base'?'baseDice':'dbDice';
        dmg[pool][k]=Math.min((dmg[pool][k]||0)+1,20);
        const c=document.getElementById(`caCnt_${zone}_${k}`);if(c)c.textContent=dmg[pool][k];
      });
    });
    // +/- buttons
    el.querySelectorAll('.ca-dminus,.ca-dplus').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const zone=btn.dataset.zone,k=btn.dataset.die;
        const pool=zone==='base'?'baseDice':'dbDice';
        const delta=btn.classList.contains('ca-dplus')?1:-1;
        dmg[pool][k]=Math.max(0,Math.min((dmg[pool][k]||0)+delta,20));
        const c=document.getElementById(`caCnt_${zone}_${k}`);if(c)c.textContent=dmg[pool][k];
      });
    });
    // Drop zones
    ['caBaseDrop','caDbDrop'].forEach(id=>{
      const zone=document.getElementById(id);if(!zone)return;
      const pool=id==='caBaseDrop'?'baseDice':'dbDice';
      const zn=id==='caBaseDrop'?'base':'db';
      zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
      zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
      zone.addEventListener('drop',e=>{
        e.preventDefault();zone.classList.remove('drag-over');
        const k=e.dataTransfer.getData('dieKey');
        if(!DMG_DIE_KEYS.includes(k))return;
        dmg[pool][k]=(dmg[pool][k]||0)+1;
        const c=document.getElementById(`caCnt_${zn}_${k}`);if(c)c.textContent=dmg[pool][k];
      });
    });
    // Multiplier
    el.querySelectorAll('.ca-mult-opt').forEach(opt=>{
      opt.addEventListener('click',()=>{
        dmg.dbMult=parseFloat(opt.dataset.mult);
        el.querySelectorAll('.ca-mult-opt').forEach(o=>o.classList.toggle('active',o===opt));
      });
    });
    // Fixed bonus ± in edit mode
    const _updFixEdit=()=>{
      const fd=document.getElementById('caFixedBonus');
      if(fd){const f=dmg.fixedBonus;fd.textContent=f>0?'+'+f:String(f);fd.style.color=f>0?'var(--gold-bright)':f<0?'var(--red)':'var(--dim)';}
    };
    document.getElementById('caFixMinusEdit')?.addEventListener('click',()=>{dmg.fixedBonus=(dmg.fixedBonus||0)-1;_updFixEdit();});
    document.getElementById('caFixPlusEdit')?.addEventListener('click',()=>{dmg.fixedBonus=(dmg.fixedBonus||0)+1;_updFixEdit();});
    // Save
    document.getElementById('caSaveBtn')?.addEventListener('click',()=>{
      const w=(char.coc.weapons||[])[wi];if(!w)return;
      dmg.saved=true;w.dmg=dmg;this.save();
      this._caRenderDmg(char,wi,false,null);
    });
    // Cancel
    document.getElementById('caCancelBtn')?.addEventListener('click',()=>{
      this._caRenderDmg(char,wi,false,null);
    });
  },

  _caAutoCalcDmg(char,wi,w,grade,isCounter){
    const el=document.getElementById('caDmgAutoResult');if(!el)return;
    if(!w.dmg||!w.dmg.saved){
      el.className='ca-dmg-result-card';return;
    }
    const dmg=w.dmg;
    const multLabel=dmg.dbMult===0.5?'×½':dmg.dbMult===1.5?'×1½':'×1';
    const fix=dmg.fixedBonus||0;
    const isFailure=grade.includes('失败');
    const isExtreme=grade.includes('极难成功')||grade.includes('大成功');

    const rollNormal=()=>{
      const base=rollDmgPool(dmg.baseDice);
      const dbRaw=rollDmgPool(dmg.dbDice);
      const dbFinal=fl(dbRaw.total*(dmg.dbMult||1));
      const total=Math.max(0,base.total+dbFinal+fix);
      const hasDB=dbRaw.results.length>0;
      const detail=`${base.results.join(' ')||'—'}${hasDB?` + ${multLabel}(${dbRaw.results.join(' ')})→${dbFinal}`:''}${fix?` + ${fix}`:''}`;
      return{total,detail,dice:[...base.results,...dbRaw.results]};
    };

    const _showDmgCard=(cardCls,icon,total,detail)=>{
      triggerResultCardAnim(el);
      el.className=`ca-dmg-result-card ${cardCls} showing`;
      el.innerHTML=`<span class="ca-dmg-result-icon">${icon}</span>
        <div class="ca-dmg-result-body">
          <div class="ca-dmg-result-num" id="caDmgNum">${total!==null?'0 伤害':'未命中'}</div>
          <div class="ca-dmg-result-detail">${detail}</div>
        </div>`;
      if(total!==null&&total>0){
        const numEl=document.getElementById('caDmgNum');
        if(numEl)animateDmgCounter(numEl,total);
      }
    };
    if(isFailure){
      triggerResultCardAnim(el);
      el.className='ca-dmg-result-card dmg-fail showing';
      el.innerHTML=`<span class="ca-dmg-result-icon">💨</span>
        <div class="ca-dmg-result-body">
          <div class="ca-dmg-result-num fail">未命中</div>
          <div class="ca-dmg-result-detail">攻击未命中，0 点伤害</div>
        </div>`;
      S.pushHist({ts:Date.now(),label:`${w.name}伤害`,dice:[],total:0,charId:char?.id,charName:char?.name});
    }else if(!isExtreme||isCounter){
      const{total,detail,dice}=rollNormal();
      const note=isCounter?' · 反击普通结算':'';
      _showDmgCard('','💥',total,detail+note);
      S.pushHist({ts:Date.now(),label:`${w.name}伤害`,dice,total,charId:char?.id,charName:char?.name});
    }else{
      const maxBase=calcMaxDmg(dmg.baseDice);
      const maxDbFinal=fl(calcMaxDmg(dmg.dbDice)*(dmg.dbMult||1));
      const maxTotal=maxBase+maxDbFinal+fix;
      if(w.penetrating){
        const extra=rollDmgPool(dmg.baseDice);
        const finalTotal=Math.max(0,maxTotal+extra.total);
        const extraStr=extra.results.join(' ')||'—';
        _showDmgCard('dmg-crit','⚡',finalTotal,`最大值${maxTotal} + 贯穿(${extraStr})=${extra.total}`);
        S.pushHist({ts:Date.now(),label:`${w.name}伤害(贯穿)`,dice:extra.results,total:finalTotal,charId:char?.id,charName:char?.name});
      }else{
        const finalTotal=Math.max(0,maxTotal);
        _showDmgCard('dmg-crit','⚡',finalTotal,'所有骰子取最大值');
        S.pushHist({ts:Date.now(),label:`${w.name}伤害(极难)`,dice:[],total:finalTotal,charId:char?.id,charName:char?.name});
      }
    }
    renderHistory();
  },

  _caBindArena(char){
    document.getElementById('caIsCounter')?.addEventListener('click',e=>{
      e.currentTarget.classList.toggle('active');
    });
    document.getElementById('caWeaponSel')?.addEventListener('change',e=>{
      this._caSelIdx=parseInt(e.target.value)||0;
      this._caUpdateSkillInfo(char,this._caSelIdx);
      this._caRenderDmg(char,this._caSelIdx,false,null);
      const rd=document.getElementById('caDmgAutoResult');
      if(rd){rd.className='ca-dmg-result-card';rd.innerHTML='';}
      const rc=document.getElementById('caCombatResult');
      if(rc){rc.className='ca-result-card';rc.innerHTML='';}
    });
    const btn=document.getElementById('caCombatBtn');if(!btn)return;
    btn.innerHTML=`${DICE_OUTLINE_SVG} 判定`;
    const origHtml=btn.innerHTML;
    btn.addEventListener('click',()=>{
      if(btn.disabled)return;
      const wi=this._caSelIdx;
      const w=(char.coc.weapons||[])[wi];if(!w)return;
      const val=getCombatSkillVal(char,w.skill);
      const adv=document.getElementById('caAdvSel')?.value||'normal';
      const isCounter=document.getElementById('caIsCounter')?.classList.contains('active')||false;
      const bonusN=adv.startsWith('b')?parseInt(adv[1]):0;
      const penaltyN=adv.startsWith('p')?parseInt(adv[1]):0;
      const ones=fl(Math.random()*10);
      const extra=Math.max(bonusN,penaltyN);
      const tensArr=[fl(Math.random()*10)*10];
      for(let i=0;i<extra;i++)tensArr.push(fl(Math.random()*10)*10);
      const tens=bonusN>0?Math.min(...tensArr):penaltyN>0?Math.max(...tensArr):tensArr[0];
      const roll=(tens===0&&ones===0)?100:tens+ones;
      const tensDisp=tensArr.map(t=>t===0?'00':String(t)).join(',');
      const advNote=adv!=='normal'?` [十位:${tensDisp} 个位:${ones}]`:'';
      SFX.roll();
      const{grade,cls}=cocGrade(roll,val);
      setTimeout(()=>SFX.grade(grade),320);
      const gradeColor={
        'cr-crit':'var(--gold)','cr-ext':'#c084fc','cr-hard':'#60a5fa',
        'cr-ok':'var(--green)','cr-fail':'rgba(160,160,180,.7)','cr-fumb':'var(--red)'
      }[cls]||'var(--text)';
      const rc=document.getElementById('caCombatResult');
      if(rc){
        // Reset to replay animation
        rc.className=`ca-result-card ${cls}`;
        rc.innerHTML=`<div class="ca-result-grade" style="color:${gradeColor}">${grade}${isCounter?' <span style="font-size:12px;opacity:.6"> · 反击</span>':''}</div>
          <div class="ca-result-detail-txt">${esc(w.skill)} — 投出 ${roll} / 需要 ${val}${advNote}</div>`;
        void rc.offsetWidth;
        rc.classList.add('showing');
      }
      this._caAutoCalcDmg(char,wi,w,grade,isCounter);
      S.pushHist({ts:Date.now(),label:`${w.name}战斗判定`,dice:[`D100=${roll}`],total:roll,grade,charId:char?.id,charName:char?.name});
      renderHistory();
      startCooldown(btn,3,origHtml);
    });
  },
});

/* ===== VISUAL EFFECTS ===== */

// Star particles
function spawnStars(){
  const frag=document.createDocumentFragment();
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<.7?1:Math.random()<.5?1.5:2;
    Object.assign(s.style,{
      width:sz+'px',height:sz+'px',
      left:(Math.random()*100)+'%',top:(Math.random()*100)+'%',
      '--d':(2.5+Math.random()*5).toFixed(1)+'s',
      '--delay':(-Math.random()*6).toFixed(1)+'s',
      '--lo':(0.03+Math.random()*.08).toFixed(2),
      '--hi':(0.25+Math.random()*.45).toFixed(2),
    });
    frag.appendChild(s);
  }
  document.body.appendChild(frag);
}

// Button ripple
document.addEventListener('click',e=>{
  const btn=e.target.closest('.btn,.dcb,.cp-adj');
  if(!btn)return;
  const r=document.createElement('span');
  r.className='ripple';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*1.4;
  Object.assign(r.style,{
    width:size+'px',height:size+'px',
    left:(e.clientX-rect.left-size/2)+'px',
    top:(e.clientY-rect.top-size/2)+'px',
  });
  btn.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
},true);

// Particle burst on grade result
function burstParticles(x,y,color,count=16){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*80;
    const sz=2+Math.random()*4;
    Object.assign(p.style,{
      left:x+'px',top:y+'px',
      width:sz+'px',height:sz+'px',
      background:color,
      '--tx':Math.round(Math.cos(angle)*dist)+'px',
      '--ty':Math.round(Math.sin(angle)*dist-60)+'px',
      '--dur':(.45+Math.random()*.35).toFixed(2)+'s',
      '--ease':Math.random()<.5?'ease-out':'cubic-bezier(.2,.8,.3,1)',
      boxShadow:`0 0 ${Math.ceil(sz)}px ${color}`,
    });
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// Screen flash (fumble)
function screenFlash(){
  const f=document.createElement('div');
  f.className='screen-flash';
  document.body.appendChild(f);
  f.addEventListener('animationend',()=>f.remove());
}

// Hook into grade display to trigger effects
const _origSFXgrade=SFX.grade.bind(SFX);
SFX.grade=function(g){
  _origSFXgrade(g);
  if(!g)return;
  // Find the most recently shown result element for position reference
  const el=document.querySelector('.check-result-inline,.cr-crit,.cr-fumb');
  const rect=el?el.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0};
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  if(g.includes('大成功')){
    burstParticles(cx,cy,'#f0c060',22);
    setTimeout(()=>burstParticles(cx,cy,'#c9a84c',14),180);
  }else if(g.includes('大失败')){
    burstParticles(cx,cy,'#e74c3c',18);
    screenFlash();
  }
};

// Low bar detection — add .low class when ≤30%
function checkLowBars(){
  const char=App.char;if(!char)return;
  if(char.mode==='COC'){
    const hp=char.coc.HP,san=char.coc.SAN;
    const hpEl=document.getElementById('cpHpBar');
    const sanEl=document.getElementById('cpSanBar');
    if(hpEl)hpEl.classList.toggle('low',hp.max>0&&hp.cur/hp.max<=.3);
    if(sanEl)sanEl.classList.toggle('low',san.max>0&&san.cur/san.max<=.3);
    // SAN danger body pulse
    const mad=char.coc.madness||{};
    document.body.classList.toggle('san-danger',!!(mad.indefinite||mad.temporary&&san.cur<=0));
  }
}
// Wrap adjustBar to trigger low-bar check after each adjustment
const _origAdjustBar=App.adjustBar.bind(App);
App.adjustBar=function(...args){_origAdjustBar(...args);checkLowBars();};
// Also check on full refresh
const _origRefresh=App.refresh.bind(App);
App.refresh=function(){_origRefresh();setTimeout(checkLowBars,50);};

/* ===== Utility: name → stable hsl color (for avatars) ===== */
function nameHashColor(name){
  let h=0;
  for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffffffff;
  return`hsl(${Math.abs(h)%360},55%,35%)`;
}

/* ===== Utility: compress image to 100×100 JPEG ≤50KB ===== */
function compressAvatarToBase64(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=c.height=100;
      c.getContext('2d').drawImage(img,0,0,100,100);
      resolve(c.toDataURL('image/jpeg',.75));
    };
    img.onerror=()=>resolve('');
    img.src=dataUrl;
  });
}

const DEFAULT_CHANNELS=[
  {id:'general',displayName:'综合',protected:true},
  {id:'team-a',displayName:'A队',protected:false},
  {id:'team-b',displayName:'B队',protected:false},
];
const CH_COLORS={general:'#c9a84c','team-a':'#27ae60','team-b':'#2980b9'};
function _chColor(id){return CH_COLORS[id]||'#8e44ad';}

const FB={
  db:null, roomId:null, playerName:null, isKP:false,
  activeCh:'general', channels:{}, members:{},
  channelList:{}, _kpChListeners:{}, _histFilterCh:'',
  _listeners:[], _rollRef:null, _rollListener:null,
  _playerRef:null, _hostRef:null, _membersCollapsed:false,
  _subChCollapsed:false,

  init(){
    try{
      if(typeof firebase==='undefined'){console.warn('Firebase SDK not loaded');return;}
      const app=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(firebaseConfig);
      this.db=firebase.database(app);
      this._subChCollapsed=localStorage.getItem('fb_subch_collapsed')==='1';
    }catch(e){console.error('Firebase init:',e);}
  },

  async joinRoom(roomId,playerName){
    if(!this.db){this._toast('Firebase 未加载','error');return;}
    try{
      this.roomId=roomId.trim().replace(/[^a-zA-Z0-9_-]/g,'').slice(0,20)||null;
      if(!this.roomId){this._toast('房间ID只能含字母、数字、-、_','error');return;}
      this.playerName=(playerName.trim()||'玩家').slice(0,16);
      this._setDot('connecting');
      // First to join becomes KP/host
      this._hostRef=this.db.ref(`rooms/${this.roomId}/host`);
      const hostSnap=await this._hostRef.once('value');
      if(!hostSnap.exists()){
        this.isKP=true;
        await this._hostRef.set(this.playerName);
        this._hostRef.onDisconnect().remove();
      }else{
        this.isKP=false;
      }
      // Register player presence (include characterName for member list)
      this._playerRef=this.db.ref(`rooms/${this.roomId}/players/${this.playerName}`);
      const charSnap=this._charSnapshot();
      await this._playerRef.set({online:true,ts:Date.now(),isKP:this.isKP,char:charSnap,
        characterName:charSnap&&charSnap.name?charSnap.name:'',currentChannel:'general'});
      this._playerRef.onDisconnect().remove();
      // Ensure default channels exist (channelList metadata + channels data node)
      const clRef=this.db.ref(`rooms/${this.roomId}/channelList`);
      const clSnap=await clRef.once('value');
      if(!clSnap.exists()){
        const defaults={};
        for(const c of DEFAULT_CHANNELS){
          defaults[c.id]={displayName:c.displayName,protected:c.protected,created:Date.now()};
        }
        await clRef.set(defaults);
      }
      // Backward compat: ensure rolls nodes exist for default channels
      for(const c of DEFAULT_CHANNELS){
        const chRef=this.db.ref(`rooms/${this.roomId}/channels/${c.id}`);
        if(!(await chRef.once('value')).exists())
          await chRef.set({created:Date.now(),name:c.id});
      }
      this._listenChannels();
      this._listenMembers();
      await this.setActiveCh('general');
      this._updateUI(true);
      this._setDot('online');
      this._renderFooter();
      const rn=document.getElementById('fbSbRoomName');
      if(rn){rn.textContent=this.roomId.slice(0,12);rn.classList.remove('disconnected');}
      if(this.isKP){
        document.getElementById('fbSbCrown')?.classList.remove('hidden');
        document.getElementById('fbSbKpBadge')?.classList.remove('hidden');
        document.getElementById('fbSbKpTag')?.classList.remove('hidden');
      }
      this._toast('已连接到 '+this.roomId+(this.isKP?' · 你是KP':''),'success');
    }catch(e){
      this._setDot('');
      this._toast('连接失败: '+e.message,'error');
      console.error('joinRoom:',e);
    }
  },

  leaveRoom(){
    if(this.isKP&&this._hostRef){try{this._hostRef.remove();}catch(e){}this._hostRef=null;}
    if(this._playerRef){try{this._playerRef.remove();}catch(e){}this._playerRef=null;}
    for(const{ref,type,fn}of this._listeners){try{ref.off(type,fn);}catch(e){}}
    this._listeners=[];
    if(this._rollRef&&this._rollListener){
      try{this._rollRef.off('child_added',this._rollListener);}catch(e){}
      this._rollRef=null;this._rollListener=null;
    }
    // Clean up KP per-channel listeners
    for(const[ch,{ref,fn}]of Object.entries(this._kpChListeners)){
      try{ref.off('child_added',fn);}catch(e){}
    }
    this._kpChListeners={};
    this.roomId=null;this.isKP=false;this.channels={};this.members={};
    this.channelList={};this._histFilterCh='';
    this._updateUI(false);
    this._setDot('');
    const rn=document.getElementById('fbSbRoomName');
    if(rn){rn.textContent='未连接';rn.classList.add('disconnected');}
    document.getElementById('fbSbCrown')?.classList.add('hidden');
    document.getElementById('fbSbKpBadge')?.classList.add('hidden');
    document.getElementById('fbSbKpTag')?.classList.add('hidden');
    const cl=document.getElementById('fbChList');if(cl)cl.innerHTML='';
    const ml=document.getElementById('fbMembersList');if(ml)ml.innerHTML='';
    this._updateChIndicator('');
  },

  async setActiveCh(chName){
    if(this._rollRef&&this._rollListener){
      try{this._rollRef.off('child_added',this._rollListener);}catch(e){}
      this._rollRef=null;this._rollListener=null;
    }
    this.activeCh=chName;
    // Update currentChannel in Firebase (for member list filtering)
    if(this._playerRef)this._playerRef.update({currentChannel:chName}).catch(()=>{});
    // Non-KP: listen to active channel for incoming rolls
    if(!this.isKP){
      this._rollRef=this.db.ref(`rooms/${this.roomId}/channels/${chName}/rolls`);
      const existing=await this._rollRef.once('value');
      const lastKey=existing.exists()?Object.keys(existing.val()||{}).pop():null;
      this._rollListener=this._rollRef.on('child_added',snap=>{
        if(lastKey&&snap.key<=lastKey)return;
        const d=snap.val();if(!d)return;
        if(d.player===this.playerName)return;
        S.pushHist({
          ts:d.ts||Date.now(),
          label:`[${d.player||'?'}] ${d.label||''}`,
          dice:Array.isArray(d.dice)?d.dice:(d.dice?[d.dice]:[]),
          results:d.results||[],
          total:d.total||0,
          charId:d.charId||d.player||'remote',
          charName:d.charName||d.player||'远程玩家',
          playerId:d.player||'',
          channel:chName,
          fromFB:true,
        });
        renderHistory();
      });
    }
    this._renderChList();
    this._renderMembers(); // re-filter member list for non-KP
    const displayName=this.channelList[chName]?.displayName||chName;
    this._updateChIndicator(displayName);
    const chEl=document.getElementById('fbSbCharCh');
    if(chEl)chEl.textContent='# '+displayName;
  },

  async createChannel(chName){
    if(!this.isKP||!this.roomId||!chName.trim())return;
    const name=chName.trim().replace(/[^a-zA-Z0-9_一-鿿㐀-䶿-]/g,'').slice(0,16);
    if(!name){this._toast('频道名含非法字符','error');return;}
    try{
      await this.db.ref(`rooms/${this.roomId}/channels/${name}`).set({created:Date.now(),name});
      await this.db.ref(`rooms/${this.roomId}/channelList/${name}`)
        .set({displayName:name,protected:false,created:Date.now()});
      await this.setActiveCh(name);
      this._toast('频道 #'+name+' 已创建','success');
    }catch(e){console.error('createChannel:',e);}
  },

  async deleteChannel(chName){
    if(!this.isKP||!this.roomId)return;
    const meta=this.channelList[chName];
    if(meta&&meta.protected){this._toast('不能删除预设频道','error');return;}
    if(!confirm(`确认删除频道 #${chName}？`))return;
    try{
      await this.db.ref(`rooms/${this.roomId}/channels/${chName}`).remove();
      await this.db.ref(`rooms/${this.roomId}/channelList/${chName}`).remove();
      // Clean up KP listener for this channel
      if(this._kpChListeners[chName]){
        try{this._kpChListeners[chName].ref.off('child_added',this._kpChListeners[chName].fn);}catch(e){}
        delete this._kpChListeners[chName];
      }
      if(this.activeCh===chName)await this.setActiveCh('general');
    }catch(e){console.error('deleteChannel:',e);}
  },

  pushRoll(entry){
    if(!this.roomId||!this.db||!this.activeCh)return;
    const ch=this.activeCh;
    try{
      this.db.ref(`rooms/${this.roomId}/channels/${ch}/rolls`).push({
        ts:entry.ts||Date.now(),
        player:this.playerName,
        playerId:this.playerName,
        charId:entry.charId||'',
        charName:entry.charName||this.playerName,
        label:entry.label||'',
        dice:Array.isArray(entry.dice)?entry.dice:(entry.dice?[entry.dice]:[]),
        results:Array.isArray(entry.results)?entry.results:[],
        total:entry.total||0,
        channel:ch,
      });
    }catch(e){console.error('pushRoll:',e);}
  },

  syncPlayer(){
    if(!this._playerRef||!this.roomId)return;
    const charSnap=this._charSnapshot();
    try{this._playerRef.update({char:charSnap,ts:Date.now(),isKP:this.isKP,
      characterName:charSnap&&charSnap.name?charSnap.name:'',
      currentChannel:this.activeCh});}
    catch(e){}
  },

  _charSnapshot(){
    const c=App.char;if(!c)return null;
    const s={name:c.name,mode:c.mode,charId:c.id};
    if(c._avatarCompressed)s.avatar=c._avatarCompressed;
    if(c.mode==='COC'){s.HP={...c.coc.HP};s.SAN={...c.coc.SAN};s.MP={...c.coc.MP};}
    else if(c.mode==='DND'){s.HP={...c.dnd.HP};s.AC=c.dnd.AC;}
    return s;
  },

  _listenChannels(){
    // Listen to channelList for metadata (display names, protected flag)
    const clRef=this.db.ref(`rooms/${this.roomId}/channelList`);
    const clFn=clRef.on('value',snap=>{
      const raw=snap.val()||{};
      this.channelList=raw;
      // Backward compat: if channelList is empty, derive from channels
      if(!Object.keys(raw).length){
        Object.keys(this.channels).forEach(id=>{
          this.channelList[id]={displayName:id,protected:id==='general',created:0};
        });
      }
      this._renderChList();
      if(this.isKP)this._listenAllRolls();
    });
    this._listeners.push({ref:clRef,type:'value',fn:clFn});
    // Also listen to channels node for backward compat (rooms without channelList)
    const ref=this.db.ref(`rooms/${this.roomId}/channels`);
    const fn=ref.on('value',snap=>{
      this.channels=snap.val()||{};
      if(!Object.keys(this.channelList).length){
        Object.keys(this.channels).forEach(id=>{
          this.channelList[id]={displayName:id,protected:id==='general',created:0};
        });
        this._renderChList();
      }
    });
    this._listeners.push({ref,type:'value',fn});
  },

  _listenAllRolls(){
    if(!this.isKP||!this.roomId)return;
    // Fix 1: use channelList (not channels) so IDs are correct even before channels node loads
    const allChs=Object.keys(this.channelList);
    for(const chName of allChs){
      if(this._kpChListeners[chName])continue; // already listening (or pending)
      this._kpChListeners[chName]='pending'; // prevent race-condition double-subscribe
      const rollRef=this.db.ref(`rooms/${this.roomId}/channels/${chName}/rolls`);
      rollRef.once('value').then(existing=>{
        if(!this.roomId){delete this._kpChListeners[chName];return;}
        const lastKey=existing.exists()?Object.keys(existing.val()||{}).pop():null;
        const rollFn=rollRef.on('child_added',snap=>{
          if(lastKey&&snap.key<=lastKey)return;
          const d=snap.val();if(!d)return;
          if(d.player===this.playerName)return;
          S.pushHist({
            ts:d.ts||Date.now(),
            label:`[${d.player||'?'}] ${d.label||''}`,
            dice:Array.isArray(d.dice)?d.dice:(d.dice?[d.dice]:[]),
            results:d.results||[],
            total:d.total||0,
            charId:d.charId||d.player||'remote',
            charName:d.charName||d.player||'远程玩家',
            playerId:d.player||'', // Fix 2
            channel:chName,
            fromFB:true,
          });
          renderHistory();
        });
        this._kpChListeners[chName]={ref:rollRef,fn:rollFn};
      });
    }
  },

  _listenMembers(){
    const ref=this.db.ref(`rooms/${this.roomId}/players`);
    const fn=ref.on('value',snap=>{
      this.members=snap.val()||{};
      this._renderMembers();
    });
    this._listeners.push({ref,type:'value',fn});
  },

  _renderChList(){
    const el=document.getElementById('fbChList');if(!el)return;
    // Count members per channel (Fix 5)
    const countPerCh={};
    Object.values(this.members).forEach(m=>{
      if(!m)return;
      const ch=m.currentChannel||'general';
      countPerCh[ch]=(countPerCh[ch]||0)+1;
    });
    const allIds=Object.keys(Object.keys(this.channelList).length?this.channelList:this.channels);
    const parentIds=allIds.filter(id=>id==='general');
    const childIds=allIds.filter(id=>id!=='general').sort((a,b)=>a.localeCompare(b));
    const _renderItem=(ch,isParent)=>{
      const meta=this.channelList[ch]||{displayName:ch,protected:ch==='general'};
      const active=ch===this.activeCh;
      const canDel=this.isKP&&!meta.protected;
      const cnt=countPerCh[ch]||0;
      const countHtml=cnt>0?`<span class="fb-ch-count">${cnt}</span>`:'';
      const hashCls=isParent?'fb-ch-hash ch-parent-icon':'fb-ch-hash';
      const hashIcon=isParent?'🌐':'#';
      const nameCls=isParent?'fb-ch-name ch-parent-name':'fb-ch-name ch-child-name';
      const itemCls=`fb-ch-item${active?' active':''}${isParent?' ch-parent':' ch-child'}`;
      return`<div class="${itemCls}" data-ch="${esc(ch)}">
        <span class="${hashCls}">${hashIcon}</span>
        <span class="${nameCls}" data-rename-name="1">${esc(meta.displayName||ch)}</span>
        ${countHtml}
        <span class="fb-ch-unread"></span>
        ${canDel?`<button class="fb-ch-del" data-del="${esc(ch)}" title="删除频道">×</button>`:''}
      </div>`;
    };
    let html=parentIds.map(ch=>_renderItem(ch,true)).join('');
    if(childIds.length){
      const collapsed=this._subChCollapsed;
      html+=`<div class="fb-ch-sep"></div>`;
      html+=`<div class="fb-ch-sub-hdr" id="fbChSubHdr"><span class="fb-ch-sub-arrow${collapsed?' collapsed':''}">▾</span>小队频道</div>`;
      if(!collapsed)html+=childIds.map(ch=>_renderItem(ch,false)).join('');
    }
    el.innerHTML=html;
    // Click → switch channel
    el.querySelectorAll('.fb-ch-item').forEach(item=>{
      item.addEventListener('click',e=>{
        if(e.target.classList.contains('fb-ch-del'))return;
        if(e.target.tagName==='INPUT')return;
        this.setActiveCh(item.dataset.ch);
      });
    });
    // Delete channel
    el.querySelectorAll('.fb-ch-del').forEach(btn=>{
      btn.addEventListener('click',e=>{e.stopPropagation();this.deleteChannel(btn.dataset.del);});
    });
    // Fix 4: double-click rename (KP only, non-protected)
    if(this.isKP){
      el.querySelectorAll('[data-rename-name]').forEach(nameSpan=>{
        const item=nameSpan.closest('.fb-ch-item');
        const ch=item?.dataset.ch;
        if(!ch)return;
        const meta=this.channelList[ch]||{};
        if(meta.protected)return;
        nameSpan.addEventListener('dblclick',e=>{
          e.stopPropagation();
          const orig=nameSpan.textContent;
          const inp=document.createElement('input');
          inp.className='fb-ch-rename-inp';
          inp.value=orig;
          nameSpan.replaceWith(inp);
          inp.focus();inp.select();
          const commit=()=>{
            const v=inp.value.trim();
            if(v&&v!==orig){
              this.db.ref(`rooms/${this.roomId}/channelList/${ch}/displayName`).set(v)
                .catch(err=>this._toast('重命名失败: '+err.message,'error'));
            }
            // channelList listener will re-render; do a local restore if unchanged
            if(!v||v===orig)this._renderChList();
          };
          inp.addEventListener('blur',commit,{once:true});
          inp.addEventListener('keydown',e2=>{
            if(e2.key==='Enter'){e2.preventDefault();inp.blur();}
            else if(e2.key==='Escape'){inp.value=orig;inp.removeEventListener('blur',commit);inp.blur();this._renderChList();}
          });
        });
      });
    }
    // Fix 6: sub-channel collapse toggle
    document.getElementById('fbChSubHdr')?.addEventListener('click',()=>{
      this._subChCollapsed=!this._subChCollapsed;
      localStorage.setItem('fb_subch_collapsed',this._subChCollapsed?'1':'0');
      this._renderChList();
    });
  },

  _renderMembers(){
    const el=document.getElementById('fbMembersList');
    const secLbl=document.getElementById('fbMbrSecLbl');
    if(!el)return;
    const allEntries=Object.entries(this.members).filter(([,m])=>m);
    // Fix 3: non-KP sees only current channel members; KP sees all
    let displayEntries;
    if(this.isKP){
      displayEntries=allEntries;
    }else{
      displayEntries=allEntries.filter(([,m])=>{
        if(!m.currentChannel)return true; // backward compat: no currentChannel → show
        return m.currentChannel===this.activeCh;
      });
    }
    const total=displayEntries.length;
    if(secLbl)secLbl.textContent=`成员 (${total} 在线)`;
    // Sort KP first, then alphabetically
    displayEntries.sort(([na,ma],[nb,mb])=>{
      if(ma.isKP&&!mb.isKP)return -1;
      if(!ma.isKP&&mb.isKP)return 1;
      return na.localeCompare(nb);
    });
    el.innerHTML=displayEntries.map(([playerName,m])=>{
      const char=m.char;
      const isThisKP=!!m.isKP;
      const charName=m.characterName||(char&&char.name&&char.name!=='新角色'?char.name:'');
      const displayName=charName||playerName;
      const showPlayerId=charName&&charName!==playerName;
      // Fix 3: KP shows which channel each member is in
      const chLabel=this.isKP&&m.currentChannel
        ?`<div style="font-size:9px;color:var(--dim);line-height:1.2"># ${esc(this.channelList[m.currentChannel]?.displayName||m.currentChannel)}</div>`
        :'';
      let barsHtml='';
      if(!isThisKP&&char){
        if(char.HP&&char.HP.max>0){
          const pct=Math.round(clamp(char.HP.cur/char.HP.max*100,0,100));
          barsHtml+=`<div class="fb-mbr-bar-row"><span style="font-size:9px;color:var(--dim);width:14px">HP</span><div class="fb-mbr-bar-track"><div class="fb-mbr-bar-fill hp" style="width:${pct}%"></div></div><span style="font-size:9px;color:var(--dim);white-space:nowrap">${char.HP.cur}/${char.HP.max}</span></div>`;
        }
        if(char.SAN&&char.SAN.max>0){
          const pct=Math.round(clamp(char.SAN.cur/char.SAN.max*100,0,100));
          barsHtml+=`<div class="fb-mbr-bar-row"><span style="font-size:9px;color:var(--dim);width:14px">理</span><div class="fb-mbr-bar-track"><div class="fb-mbr-bar-fill san" style="width:${pct}%"></div></div><span style="font-size:9px;color:var(--dim);white-space:nowrap">${char.SAN.cur}/${char.SAN.max}</span></div>`;
        }
      }
      const avatarBg=char&&char.avatar?'transparent':nameHashColor(playerName);
      const avatarContent=char&&char.avatar
        ?`<img src="${char.avatar}" style="width:100%;height:100%;object-fit:cover">`
        :`<span style="color:#fff;font-size:11px;font-weight:700">${(displayName[0]||'?').toUpperCase()}</span>`;
      return`<div class="fb-mbr-item">
        <div class="fb-mbr-avatar" style="background:${avatarBg}">${avatarContent}</div>
        <div class="fb-mbr-info">
          <div class="fb-mbr-charname">${esc(displayName)}</div>
          ${showPlayerId?`<div class="fb-mbr-playerid">${esc(playerName)}</div>`:''}
          ${chLabel}
        </div>
        ${isThisKP?`<span class="fb-mbr-kp-badge">KP</span>`:''}
        ${barsHtml?`<div class="fb-mbr-bars">${barsHtml}</div>`:''}
      </div>`;
    }).join('');
  },

  _renderFooter(){
    const c=App.char;
    const charNm=c&&c.name&&c.name!=='新角色'?c.name:'';
    const playerNm=this.playerName||'-';
    const displayNm=charNm||playerNm;
    const nameEl=document.getElementById('fbSbCharName');
    const chEl=document.getElementById('fbSbCharCh');
    const avatarEl=document.getElementById('fbSbAvatar');
    if(nameEl)nameEl.textContent=displayNm;
    // Show player ID as subtitle if character name differs
    if(chEl&&charNm&&charNm!==playerNm)
      chEl.textContent=playerNm;
    else if(chEl)
      chEl.textContent='# '+(this.channelList[this.activeCh]?.displayName||this.activeCh);
    if(avatarEl){
      if(c&&c.avatar){
        avatarEl.style.background='transparent';
        avatarEl.innerHTML=`<img src="${c.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      }else{
        avatarEl.style.background=nameHashColor(displayNm);
        avatarEl.innerHTML=`<span style="color:#fff;font-size:13px;font-weight:700">${(displayNm[0]||'?').toUpperCase()}</span>`;
      }
    }
  },

  _updateUI(inRoom){
    const joinSec=document.getElementById('fbJoinSection');
    const chSec=document.getElementById('fbChSection');
    const mbrSec=document.getElementById('fbMbrSection');
    const footer=document.getElementById('fbSbFooter');
    const addBtn=document.getElementById('fbChAddBtn');
    const leaveBtn=document.getElementById('btnFbLeave');
    if(inRoom){
      joinSec?.classList.add('hidden');
      chSec?.classList.remove('hidden');
      mbrSec?.classList.remove('hidden');
      footer?.classList.remove('hidden');
      if(addBtn&&this.isKP)addBtn.classList.add('visible');
      leaveBtn?.classList.add('visible');
    }else{
      joinSec?.classList.remove('hidden');
      chSec?.classList.add('hidden');
      mbrSec?.classList.add('hidden');
      footer?.classList.add('hidden');
      leaveBtn?.classList.remove('visible');
    }
  },

  _setDot(state){
    const dot=document.getElementById('fbSbDot');
    if(!dot)return;
    dot.className='fb-sb-dot'+(state?' '+state:'');
  },

  _updateChIndicator(chName){
    const ind=document.getElementById('tbChIndicator');
    const nm=document.getElementById('tbChName');
    if(!ind)return;
    if(chName){ind.classList.add('visible');if(nm)nm.textContent=chName;}
    else ind.classList.remove('visible');
  },

  _toast(msg,type){
    const wrap=document.getElementById('fb-toast-wrap');if(!wrap)return;
    const t=document.createElement('div');
    t.className='fb-toast'+(type?' '+type:'');
    t.textContent=msg;
    wrap.appendChild(t);
    setTimeout(()=>{t.classList.add('out');t.addEventListener('animationend',()=>t.remove(),{once:true});},3000);
  },

  bindUI(){
    // Mobile sidebar toggle
    document.getElementById('btnFbToggle')?.addEventListener('click',()=>{
      document.getElementById('fb-sidebar')?.classList.toggle('mobile-open');
      document.getElementById('fbMobileOverlay')?.classList.toggle('visible');
    });
    document.getElementById('fbMobileOverlay')?.addEventListener('click',()=>{
      document.getElementById('fb-sidebar')?.classList.remove('mobile-open');
      document.getElementById('fbMobileOverlay')?.classList.remove('visible');
    });
    // Join room
    const doJoin=()=>{
      const room=(document.getElementById('fbRoomInput')?.value||'').trim();
      const name=(document.getElementById('fbNameInput')?.value||'').trim();
      if(!room){this._toast('请输入房间ID','error');return;}
      if(!name){this._toast('请输入玩家名','error');return;}
      this.joinRoom(room,name);
    };
    document.getElementById('btnFbJoin')?.addEventListener('click',doJoin);
    ['fbRoomInput','fbNameInput'].forEach(id=>{
      document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
    });
    // Leave room (with confirm)
    document.getElementById('btnFbLeave')?.addEventListener('click',()=>{
      if(!this.roomId)return;
      if(!confirm(`确认离开房间 ${this.roomId}？`))return;
      this.leaveRoom();
    });
    // Create channel (KP only): + button toggles input
    const addBtn=document.getElementById('fbChAddBtn');
    const newChInp=document.getElementById('fbNewChInput');
    if(addBtn&&newChInp){
      addBtn.addEventListener('click',()=>{
        newChInp.classList.toggle('visible');
        if(newChInp.classList.contains('visible'))newChInp.focus();
      });
      newChInp.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
          const v=newChInp.value.trim();
          if(v)this.createChannel(v);
          newChInp.value='';newChInp.classList.remove('visible');
        }else if(e.key==='Escape'){
          newChInp.value='';newChInp.classList.remove('visible');
        }
      });
    }
    // Member section collapse
    document.getElementById('fbMbrToggle')?.addEventListener('click',()=>{
      this._membersCollapsed=!this._membersCollapsed;
      const ml=document.getElementById('fbMembersList');
      if(ml)ml.style.display=this._membersCollapsed?'none':'';
    });
  },
};

// Hook S.pushHist: broadcast local rolls to Firebase (skip if fromFB to avoid echo)
const _fbOrigPushHist=S.pushHist.bind(S);
S.pushHist=function(e){_fbOrigPushHist(e);if(!e.fromFB)FB.pushRoll(e);};

// Hook App.adjustBar: sync player status after HP/SAN changes
const _fbPrevAdjBar=App.adjustBar.bind(App);
App.adjustBar=function(...args){_fbPrevAdjBar(...args);FB.syncPlayer();};

document.addEventListener('DOMContentLoaded',()=>{spawnStars();FB.init();FB.bindUI();App.init();});
</script>
</body>
</html>
