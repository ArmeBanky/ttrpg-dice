.ca-db-toggle-opt{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--border);color:var(--dim);cursor:pointer;user-select:none;transition:all .15s}
.ca-db-toggle-opt.active{border-color:rgba(201,168,76,.5);color:var(--gold);background:rgba(201,168,76,.1)}
/* Fixed bonus controls */
.ca-fix-ctrl{display:flex;align-items:center;gap:10px}
.ca-fix-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border-bright);background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;padding:0;font-weight:bold}
.ca-fix-btn:hover{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,168,76,.08)}
.ca-fix-num{font-size:22px;font-weight:bold;font-family:var(--font-num);min-width:34px;text-align:center;transition:color .2s}
/* Summary bar */
.ca-dmg-summary{height:36px;background:rgba(0,0,0,.4);display:flex;align-items:center;padding:0 14px;gap:6px;justify-content:center;border-radius:0 0 12px 12px}
.ca-summary-lbl{font-size:10px;color:rgba(255,255,255,.28);flex-shrink:0;letter-spacing:1px}
.ca-summary-expr{font-size:14px;color:#c9a84c;font-family:var(--font-num);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Cooldown ring */
.roll-cd-ring{position:absolute;top:3px;right:4px;pointer-events:none;transform:rotate(-90deg)}
.roll-cd-ring circle{fill:none;stroke:var(--gold);stroke-width:2.5;stroke-linecap:round}
.roll-btn.cd-active{position:relative;background:rgba(40,40,60,.85)!important;color:var(--dim)!important;cursor:not-allowed!important;box-shadow:none!important;border-color:var(--border)!important}

/* ============ CHARACTER CARD (edit tab) ============ */
.tab-scroll{flex:1;overflow-y:auto;padding:16px}
.import-box{margin-bottom:16px}
.import-box textarea{width:100%;min-height:76px;background:var(--surface2);color:var(--text);border:1px solid var(--border-bright);border-radius:var(--r);padding:9px;font-family:monospace;font-size:12px;resize:vertical;line-height:1.6}
.import-box textarea:focus{outline:none;border-color:var(--gold-dim)}
.import-actions{display:flex;gap:8px;margin-top:7px;align-items:center;flex-wrap:wrap}
.import-hint{font-size:11px;color:var(--dim)}
.char-card{display:grid;gap:14px}
.card-sec{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--border-bright);border-radius:var(--r);padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card-sec-title{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(212,168,67,.2);display:flex;align-items:center;gap:6px}
.card-sec-title::before{content:'';width:3px;height:10px;background:var(--gold);border-radius:2px;flex-shrink:0;opacity:.7}
.attr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:9px}
.attr-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.attr-name{font-size:10px;color:var(--dim);letter-spacing:.5px}
.attr-val{width:58px;text-align:center;background:var(--surface3);color:var(--text);border:1px solid var(--border-bright);border-radius:5px;padding:5px;font-size:21px;font-weight:bold;cursor:ns-resize;transition:border-color .15s}
.attr-val:focus{outline:none;border-color:var(--gold-dim)}
.attr-val:hover{border-color:var(--border-g)}
.derived-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:12px}
.derived-item{background:var(--surface3);border:1px solid var(--border-bright);border-radius:5px;padding:7px 10px;transition:border-color .15s}
.derived-item:hover{border-color:var(--border-g)}
.derived-n{font-size:10px;color:var(--dim);margin-bottom:2px;letter-spacing:.5px}
.derived-v{font-size:18px;font-weight:bold;color:var(--text)}
.skills-table{width:100%;border-collapse:collapse;font-size:13px}
.skills-table th{color:var(--gold);font-size:9px;letter-spacing:1.5px;padding:5px 6px;text-align:left;border-bottom:1px solid rgba(212,168,67,.25);text-transform:uppercase}
.skills-table td{padding:5px 6px;border-bottom:1px solid rgba(40,40,78,.5)}
.skills-table tr:hover td{background:var(--surface3)}
.skills-table input[type=text]{background:transparent;color:var(--text);border:none;border-bottom:1px solid transparent;width:100%;padding:2px;font-size:13px;min-width:70px}
.skills-table input[type=text]:focus{outline:none;border-bottom-color:var(--gold-dim)}
.ni{width:46px!important;text-align:center;background:var(--surface3)!important;border:1px solid var(--border-bright)!important;border-radius:4px!important;padding:2px!important;transition:border-color .15s!important}
.ni:focus{outline:none;border-color:var(--gold-dim)!important}
.sk-total{font-weight:bold;color:var(--text)}
.sk-hard{color:var(--blue);font-size:11px}
.sk-ext{color:var(--purple);font-size:11px}
.add-sk-row{display:flex;gap:7px;align-items:center;margin-top:10px;flex-wrap:wrap}
.add-sk-row input{background:var(--surface3);color:var(--text);border:1px solid var(--border-bright);border-radius:5px;padding:5px 9px;transition:border-color .15s}
.add-sk-row input:focus{outline:none;border-color:var(--gold-dim)}
.dnd-attr-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.dnd-attr-item{display:flex;flex-direction:column;align-items:center;background:linear-gradient(160deg,var(--surface3),var(--surface2));border:1px solid var(--border-bright);border-radius:var(--r);padding:10px 5px;gap:3px;transition:border-color .15s}
.dnd-attr-item:hover{border-color:var(--border-g)}
.dnd-attr-name{font-size:9px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.dnd-score-inp{width:46px;text-align:center;background:transparent;color:var(--text);border:none;border-bottom:1px solid var(--border-bright);font-size:21px;font-weight:bold;cursor:ns-resize}
.dnd-score-inp:focus{outline:none;border-bottom-color:var(--gold-dim)}
.dnd-mod{font-size:13px;color:var(--gold);font-weight:bold}
.dnd-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px;margin-top:10px}
.dnd-info-item{background:var(--surface3);border:1px solid var(--border-bright);border-radius:5px;padding:8px 10px;transition:border-color .15s}
.dnd-info-item:hover{border-color:var(--border-g)}
.dnd-info-lbl{font-size:9px;color:var(--dim);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.dnd-info-v{font-size:17px;font-weight:bold}
.dnd-info-inp{width:100%;background:transparent;color:var(--text);border:none;border-bottom:1px solid transparent;font-size:14px;font-weight:bold;transition:border-bottom-color .15s}
.dnd-info-inp:hover{border-bottom-color:var(--border-bright)}
.dnd-info-inp:focus{outline:none;border-bottom-color:var(--gold-dim)}
.prof-list{display:flex;flex-direction:column;gap:4px}
.prof-row{display:flex;align-items:center;gap:7px;font-size:13px;padding:4px 2px;border-bottom:1px solid rgba(40,40,78,.4);color:var(--text-muted);transition:color .15s}
.prof-row:hover{color:var(--text)}
.prof-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-bright);cursor:pointer;flex-shrink:0;transition:all .15s}
.prof-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 5px rgba(212,168,67,.4)}
.prof-val{margin-left:auto;color:var(--gold);font-weight:bold;font-size:13px}
.check-panel{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--border-bright);border-radius:var(--r);padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.check-panel-title{color:var(--gold-bright);font-size:11px;font-weight:bold;margin-bottom:11px;letter-spacing:2px;text-transform:uppercase}
.check-ctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.check-ctrls select,.check-ctrls input[type=number]{background:var(--surface3);color:var(--text);border:1px solid var(--border-bright);border-radius:5px;padding:4px 8px;transition:border-color .15s}
.check-ctrls select:focus,.check-ctrls input:focus{outline:none;border-color:var(--gold-dim)}
.check-ctrls label{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:4px;cursor:pointer}
.check-res{padding:14px;border-radius:var(--r);font-size:17px;font-weight:bold;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px solid var(--border-bright);background:var(--surface3);transition:all .3s}
.cr-det{font-size:12px;font-weight:normal;color:var(--text-muted)}

/* ============ HISTORY ============ */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:bold;color:var(--text)}
.hist-list{display:flex;flex-direction:column;gap:10px}
.hist-group{border:1px solid var(--border-bright);border-radius:var(--r);overflow:hidden}
.hist-group-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(135deg,var(--surface3),var(--surface2));cursor:pointer;user-select:none;transition:background .15s}
.hist-group-hdr:hover{background:linear-gradient(135deg,var(--surface4),var(--surface3))}
.hist-group-name{font-weight:bold;color:var(--gold);font-size:13px;flex:1}
.hist-group-count{font-size:11px;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 8px}
.hist-group-toggle{font-size:11px;color:var(--dim);width:16px;text-align:center;transition:transform .2s}
.hist-group-toggle.open{transform:rotate(90deg)}
.hist-group-body{display:flex;flex-direction:column;gap:0;background:var(--surface)}
.hist-item{border-top:1px solid var(--border);padding:11px 14px;transition:background .12s;animation:fadeSlide .25s ease both}
.hist-item:hover{background:var(--surface2)}
.hist-header{display:flex;justify-content:space-between;margin-bottom:4px;align-items:flex-start}
.hist-label{font-weight:bold;color:var(--gold);font-size:13px}
.hist-ts{font-size:10px;color:var(--dim);margin-top:2px}
.hist-dice{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.hist-die{font-size:11px;padding:2px 7px;background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--dim)}
.hist-total{font-size:14px;font-weight:bold;color:var(--text)}
.empty{color:var(--dim);text-align:center;padding:40px 20px;font-size:14px;letter-spacing:.3px}

/* ============ OVERLAY ============ */
#overlay-mad{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(4px)}
#overlay-mad.show{display:flex}
.mad-title{font-size:56px;font-weight:bold;color:#a855f7;letter-spacing:5px;animation:madP 2s ease-in-out infinite}
@keyframes madP{0%,100%{text-shadow:0 0 24px #8b5cf6,0 0 4px #a855f7}50%{text-shadow:0 0 60px #a855f7,0 0 120px #7c3aed,0 0 8px #fff}}
.mad-sub{font-size:17px;color:var(--dim);text-align:center;line-height:2.2}

/* ============ MISC ============ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-g)}
/* Focus ring */
input:focus,select:focus,textarea:focus{outline:none}
/* Global input style */
input[type=text],input[type=number],textarea{transition:border-color .15s}
@media(max-width:768px){.game-layout{grid-template-columns:1fr;grid-template-rows:auto auto}.game-right{border-left:none;border-top:1px solid var(--border-g)}.dnd-attr-grid{grid-template-columns:repeat(3,1fr)}}
/* ===== Firebase Sidebar Layout ===== */
#fb-layout{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0}
#fb-sidebar{width:220px;min-width:220px;background:#0b0b14;border-right:1px solid rgba(255,255,255,.055);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .3s ease,min-width .3s ease}
/* Sidebar header */
.fb-sb-hdr{height:52px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.055);flex-shrink:0;gap:7px;user-select:none}
.fb-sb-room-name{flex:1;font-family:var(--font-title);font-size:13px;color:var(--gold);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-sb-room-name.disconnected{color:#444;font-family:var(--font-body);font-weight:400;font-size:12px}
.fb-sb-dot{width:9px;height:9px;border-radius:50%;background:#3f3f4e;flex-shrink:0;transition:all .3s}
.fb-sb-dot.online{background:#22c55e;box-shadow:0 0 7px #22c55e}
.fb-sb-dot.connecting{background:#f59e0b;box-shadow:0 0 6px #f59e0b;animation:dotPulse 1s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.25}}
.fb-crown{color:var(--gold);font-size:13px;flex-shrink:0}
.fb-kp-hdr-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(201,168,76,.18);color:var(--gold);border:1px solid rgba(201,168,76,.35);flex-shrink:0}
/* Sidebar scrollable body */
.fb-sb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.fb-sb-body::-webkit-scrollbar{width:3px}
.fb-sb-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
/* Join section */
.fb-join-section{padding:14px 12px}
.fb-join-input{width:100%;box-sizing:border-box;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.07);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--font-body);margin-bottom:8px;transition:border-color .2s,box-shadow .2s;display:block}
.fb-join-input:focus{border-color:#5865f2;box-shadow:0 0 0 3px rgba(88,101,242,.18);outline:none}
.fb-join-input::placeholder{color:#383848}
.fb-join-btn{width:100%;padding:9px;background:linear-gradient(135deg,#b8922a,var(--gold));border:none;border-radius:7px;color:#0a0a0f;font-family:var(--font-title);font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.4px;transition:filter .15s,transform .1s}
.fb-join-btn:hover{filter:brightness(1.12)}
.fb-join-btn:active{transform:scale(.97)}
.fb-join-hint{font-size:10px;color:#383848;text-align:center;margin-top:7px}
/* Channel section */
.fb-ch-section-hdr{display:flex;align-items:center;padding:14px 10px 3px 12px}
.fb-ch-sec-lbl{flex:1;font-size:10px;font-weight:700;color:#3e3e52;text-transform:uppercase;letter-spacing:1.8px}
.fb-ch-add-btn{display:none;background:none;border:none;color:#3e3e52;cursor:pointer;font-size:18px;line-height:1;padding:1px 4px;border-radius:3px;transition:color .15s}
.fb-ch-add-btn.visible{display:block}
.fb-ch-add-btn:hover{color:#ccc}
.fb-ch-item{display:flex;align-items:center;padding:0 8px 0 10px;height:32px;cursor:pointer;border-radius:4px;margin:1px 6px;gap:6px;position:relative;transition:background .1s}
.fb-ch-item:hover{background:rgba(255,255,255,.06)}
.fb-ch-item.active{background:rgba(255,255,255,.1)}
.fb-ch-item.active::before{content:'';position:absolute;left:-6px;top:7px;bottom:7px;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.fb-ch-hash{font-size:16px;color:#3e3e52;line-height:1;flex-shrink:0;transition:color .12s;margin-top:-1px}
.fb-ch-item:hover .fb-ch-hash,.fb-ch-item.active .fb-ch-hash{color:#888}
.fb-ch-name{flex:1;font-size:14px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .12s}
.fb-ch-item:hover .fb-ch-name,.fb-ch-item.active .fb-ch-name{color:#ddd}
.fb-ch-unread{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0;display:none}
.fb-ch-unread.visible{display:block;animation:unreadPulse 2s ease-in-out infinite}
@keyframes unreadPulse{0%,100%{opacity:1}50%{opacity:.4}}
.fb-ch-del{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0}
.fb-ch-item:hover .fb-ch-del{opacity:1}
.fb-ch-del:hover{color:#ef4444}
.fb-ch-create-inp{width:calc(100% - 24px);box-sizing:border-box;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;font-family:var(--font-body);margin:3px 12px 4px;display:none}
.fb-ch-create-inp.visible{display:block}
.fb-ch-create-inp:focus{border-color:var(--gold);outline:none}
/* Member section */
.fb-mbr-section-hdr{display:flex;align-items:center;padding:12px 12px 3px;cursor:pointer;user-select:none}
.fb-mbr-sec-lbl{flex:1;font-size:10px;font-weight:700;color:#3e3e52;text-transform:uppercase;letter-spacing:1.8px;transition:color .15s}
.fb-mbr-section-hdr:hover .fb-mbr-sec-lbl{color:#777}
.fb-mbr-item{padding:3px 8px;margin:1px 6px;border-radius:4px;transition:background .1s}
.fb-mbr-item:hover{background:rgba(255,255,255,.04)}
.fb-mbr-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.fb-mbr-online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px #22c55e;flex-shrink:0}
.fb-mbr-name{font-size:13px;color:#bbb;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-mbr-ch-tag{font-size:10px;color:#444}
.fb-mbr-bars{padding-left:15px;display:flex;flex-direction:column;gap:3px;margin-bottom:4px}
.fb-mbr-bar-row{display:flex;align-items:center;gap:5px}
.fb-mbr-bar-bg{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.fb-mbr-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.fb-mbr-bar-fill.hp{background:#dc2626}
.fb-mbr-bar-fill.hp.low{background:linear-gradient(90deg,#7f1d1d,#f87171);animation:pulseGlow 1.4s ease-in-out infinite}
.fb-mbr-bar-fill.san{background:#7c3aed}
.fb-mbr-bar-val{font-size:10px;color:#444;flex-shrink:0;min-width:34px;text-align:right}
/* Sidebar footer */
.fb-sb-footer{height:54px;border-top:1px solid rgba(255,255,255,.055);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;background:#090910}
.fb-sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2d2a4e,#1a1a2e);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);font-family:var(--font-title);font-weight:700;flex-shrink:0;overflow:hidden}
.fb-sb-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.fb-sb-char-info{flex:1;min-width:0}
.fb-sb-char-name{font-size:12px;color:#ddd;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-sb-char-ch{font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-sb-leave-btn{background:none;border:none;color:#444;cursor:pointer;font-size:17px;padding:4px;border-radius:4px;transition:color .15s;flex-shrink:0;line-height:1}
.fb-sb-leave-btn:hover{color:#ef4444}
.fb-sb-kp-tag{font-size:10px;color:var(--gold);border:1px solid rgba(201,168,76,.35);border-radius:3px;padding:1px 5px;flex-shrink:0}
/* Toast notifications */
#fb-toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.fb-toast{background:rgba(12,12,22,.96);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 16px;color:var(--text);font-size:13px;backdrop-filter:blur(14px);transform:translateX(110%);animation:toastIn .28s ease forwards;font-family:var(--font-body);max-width:270px;border-left-width:3px}
.fb-toast.success{border-left-color:#22c55e}
.fb-toast.error{border-left-color:#ef4444}
.fb-toast.out{animation:toastOut .25s ease forwards}
@keyframes toastIn{to{transform:translateX(0)}}
@keyframes toastOut{to{transform:translateX(110%);opacity:0}}
/* Topbar: channel indicator */
.tb-ch-ind{display:none;align-items:center;gap:5px;font-size:12px}
.tb-ch-ind.visible{display:flex}
.tb-ch-ind-hash{font-size:15px;color:var(--gold)}
.tb-ch-ind-name{color:#888}
/* Mobile hamburger: visible only on small screens */
#btnFbToggle{display:none}
/* Discord-style history messages */
.hist-empty{color:#444;text-align:center;padding:40px 20px;font-size:13px}
.hist-msg{display:flex;gap:12px;padding:4px 16px;transition:background .08s;position:relative}
.hist-msg:hover{background:rgba(255,255,255,.018)}
.hist-self{background:rgba(201,168,76,.028)!important}
.hist-self:hover{background:rgba(201,168,76,.05)!important}
.hist-msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;font-family:var(--font-title);flex-shrink:0;margin-top:2px;color:#fff}
.hist-msg-body{flex:1;min-width:0}
.hist-msg-hdr{display:flex;align-items:baseline;gap:7px;margin-bottom:1px;flex-wrap:wrap}
.hist-msg-name{font-size:14px;font-weight:700;font-family:var(--font-body)}
.hist-msg-ch{font-size:10px;color:#555;padding:1px 5px;background:rgba(255,255,255,.05);border-radius:4px}
.hist-msg-time{font-size:11px;color:#3a3a4e;margin-left:auto}
.hist-msg-text{font-size:13px;color:#888;margin-bottom:3px}
.hist-msg-dice{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.hist-msg-results{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-result-die{font-size:20px;font-family:var(--font-num);font-weight:700;color:#ddd;line-height:1}
.hist-msg-total{font-size:15px;font-family:var(--font-num);color:#666}
.hist-sep{display:flex;align-items:center;gap:10px;padding:14px 16px 6px}
.hist-sep-line{flex:1;height:1px;background:rgba(255,255,255,.05)}
.hist-sep-time{font-size:10px;color:#3a3a4e;white-space:nowrap}
/* Sidebar header leave button (SVG icon) */
.fb-hdr-leave{display:none;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.35);flex-shrink:0;transition:all .2s ease;padding:0}
.fb-hdr-leave:hover{color:#e74c3c;background:rgba(231,76,60,.12)}
.fb-hdr-leave.visible{display:flex}
/* Editable character name */
.cp-name-wrap{display:inline-flex;align-items:center;gap:6px;cursor:pointer;max-width:100%}
.cp-edit-icon{font-size:12px;color:#444;opacity:0;transition:opacity .15s;flex-shrink:0;line-height:1}
.cp-name-wrap:hover .cp-edit-icon{opacity:1}
.cp-name-inp{background:transparent;border:none;border-bottom:2px solid var(--gold);color:var(--text);font-size:inherit;font-family:inherit;font-weight:inherit;letter-spacing:inherit;padding:0 2px;outline:none;min-width:60px;max-width:180px}
/* Member avatar circles */
.fb-mbr-avatar-sm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;overflow:hidden;color:#fff;font-family:var(--font-title)}
.fb-mbr-avatar-sm img{width:100%;height:100%;object-fit:cover}
/* Mobile responsive */
@media(max-width:900px){
  #fb-sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:200;transition:left .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.6)}
  #fb-sidebar.mobile-open{left:0}
  .fb-mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;display:none}
  .fb-mobile-overlay.visible{display:block}
  #btnFbToggle{display:inline-flex!important}
  .ca-layout{flex-direction:column}
  .ca-left{flex:none;width:100%;padding-right:0;border-right:none;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}
  .ca-right{padding-left:0}
}
/* ===== TASK 5: Result animations ===== */
@keyframes resultSlideIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes resultGradeBounce{0%{transform:scale(.75) rotate(-2deg)}65%{transform:scale(1.1) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
@keyframes resultShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-9px)}36%{transform:translateX(9px)}54%{transform:translateX(-5px)}72%{transform:translateX(5px)}90%{transform:translateX(-2px)}}
@keyframes gradeExtPulse{0%,100%{box-shadow:0 0 0 rgba(168,85,247,0)}50%{box-shadow:0 0 22px rgba(168,85,247,.68)}}
@keyframes gradeHardPulse{0%,100%{box-shadow:0 0 0 rgba(59,130,246,0)}50%{box-shadow:0 0 22px rgba(59,130,246,.68)}}
@keyframes dmgSlideIn{0%{opacity:0;transform:translateX(-8px)}100%{opacity:1;transform:translateX(0)}}
/* Combat result card entrance */
.ca-result-card.showing{animation:resultSlideIn .3s cubic-bezier(.34,1.56,.64,1) both}
.ca-result-card.showing .ca-result-grade{display:block;animation:resultGradeBounce .42s cubic-bezier(.34,1.56,.64,1) .07s both}
.ca-result-card.showing.cr-fumb{animation:resultSlideIn .2s ease both,resultShake .4s ease .18s both}
.ca-result-card.showing.cr-ext{animation:resultSlideIn .3s cubic-bezier(.34,1.56,.64,1) both,gradeExtPulse .85s ease .32s 2}
.ca-result-card.showing.cr-hard{animation:resultSlideIn .3s cubic-bezier(.34,1.56,.64,1) both,gradeHardPulse .85s ease .32s 2}
.ca-dmg-result-card.showing{animation:dmgSlideIn .32s cubic-bezier(.34,1.56,.64,1) .18s both}
/* ===== TASK 2: Fixed bonus hover pencil ===== */
.ca-fix-view-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.ca-fix-pencil{font-size:12px;color:var(--dim);opacity:0;transition:opacity .18s;user-select:none}
.ca-dmg-sec-fix:hover .ca-fix-pencil{opacity:1}
/* ===== TASK 4: Skill check result card ===== */
.sk-result-card{border-radius:8px;background:rgba(0,0,0,.28);border:1px solid var(--border);border-left:4px solid var(--border-bright);padding:10px 14px}
.sk-result-card.cr-crit{border-left-color:var(--gold)}
.sk-result-card.cr-ext{border-left-color:#a855f7}
.sk-result-card.cr-hard{border-left-color:#3b82f6}
.sk-result-card.cr-ok{border-left-color:var(--green)}
.sk-result-card.cr-fail{border-left-color:rgba(130,130,150,.4)}
.sk-result-card.cr-fumb{border-left-color:var(--red)}
.sk-result-grade{font-size:18px;font-weight:bold;text-align:center;margin-bottom:4px;font-family:var(--font-title);letter-spacing:.5px}
.sk-result-detail{font-size:11px;color:var(--dim);text-align:center;line-height:1.5}
/* Skill check area button/select sync */
.sk-judge-btn-row{display:flex;margin-bottom:12px}
/* prefers-reduced-motion override */
@media(prefers-reduced-motion:reduce){
  .ca-result-card.showing,.ca-result-card.showing .ca-result-grade,.ca-result-card.showing.cr-fumb,
  .ca-result-card.showing.cr-ext,.ca-result-card.showing.cr-hard,
  .ca-dmg-result-card.showing,.sk-result-card,.sk-result-grade,
  .dice-result-anim{animation:none!important;transition:none!important}
}
/* ===== Firebase channel / member new styles ===== */
/* Protected channel badge */
.fb-ch-protected{font-size:9px;color:var(--dim);margin-left:3px;opacity:.6}
/* History filter pills */
.hist-filter-row{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px 4px;border-bottom:1px solid var(--border)}
.hist-filter-pill{font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:background .15s,color .15s}
.hist-filter-pill:hover{background:rgba(255,255,255,.05);color:var(--text)}
.hist-filter-pill.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
/* Channel color dot in history */
.hist-ch-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;flex-shrink:0}
/* Member info layout */
.fb-mbr-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;transition:background .15s}
.fb-mbr-item:hover{background:rgba(255,255,255,.04)}
.fb-mbr-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;overflow:hidden}
.fb-mbr-avatar img{width:100%;height:100%;object-fit:cover}
.fb-mbr-info{flex:1;min-width:0}
.fb-mbr-charname{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.fb-mbr-playerid{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.fb-mbr-kp-badge{font-size:9px;background:rgba(201,168,76,.18);color:var(--gold);border:1px solid rgba(201,168,76,.35);border-radius:4px;padding:1px 5px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.fb-mbr-bars{display:flex;flex-direction:column;gap:2px;min-width:40px}
.fb-mbr-bar-row{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--dim)}
.fb-mbr-bar-track{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.fb-mbr-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.fb-mbr-bar-fill.hp{background:var(--green)}
.fb-mbr-bar-fill.san{background:#3b82f6}
/* Fix 2: history player ID tag */
.hist-player-id{font-size:9px;color:var(--dim);margin-left:4px;font-weight:400;font-family:var(--font-body);opacity:.8}
/* Fix 4: channel inline rename input */
.fb-ch-rename-inp{background:transparent;border:none;border-bottom:1.5px solid var(--gold);color:var(--text);font-size:12px;outline:none;padding:0 0 1px;font-family:inherit;flex:1;min-width:0;line-height:1}
/* Fix 5: channel member count badge */
.fb-ch-count{font-size:10px;background:rgba(255,255,255,.08);color:#666;border-radius:8px;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 4px;flex-shrink:0;display:inline-block}
/* Fix 6: channel hierarchy */
.fb-ch-item.ch-parent::before{content:'';position:absolute;left:-6px;top:4px;bottom:4px;width:2px;background:rgba(201,168,76,.35);border-radius:0 2px 2px 0}
.fb-ch-item.ch-parent.active::before{background:var(--gold)}
.fb-ch-hash.ch-parent-icon{font-size:13px;color:rgba(201,168,76,.55)}
.fb-ch-item.ch-parent .fb-ch-hash.ch-parent-icon,.fb-ch-item.ch-parent.active .fb-ch-hash{color:rgba(201,168,76,.8)}
.fb-ch-name.ch-parent-name{font-size:13px;color:rgba(255,255,255,.65);font-weight:500}
.fb-ch-item:hover .fb-ch-name.ch-parent-name,.fb-ch-item.active .fb-ch-name.ch-parent-name{color:#fff}
.fb-ch-name.ch-child-name{color:rgba(255,255,255,.42)}
.fb-ch-item.ch-child{padding-left:18px}
.fb-ch-sep{height:1px;background:rgba(255,255,255,.05);margin:3px 8px}
.fb-ch-sub-hdr{display:flex;align-items:center;gap:4px;padding:4px 10px 2px;font-size:10px;color:var(--dim);cursor:pointer;user-select:none;letter-spacing:.5px}
.fb-ch-sub-hdr:hover{color:#888}
.fb-ch-sub-arrow{font-size:9px;transition:transform .15s;display:inline-block;opacity:.7}
.fb-ch-sub-arrow.collapsed{transform:rotate(-90deg)}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="tb-logo">
      <span class="tb-logo-main">TTRPG<em>_Arme</em></span>
      <span class="tb-logo-sub">Dice Simulator</span>
    </div>
    <button class="btn" id="btnFbToggle" title="联机侧边栏">☰</button>
    <div class="tb-ch-ind" id="tbChIndicator">
      <span class="tb-ch-ind-hash">#</span>
      <span class="tb-ch-ind-name" id="tbChName">general</span>
    </div>
    <div style="flex:1"></div>
    <nav class="nav-tabs">
      <span class="nav-tab active" data-tab="dice">🎲 骰子台</span>
      <span class="nav-tab" data-tab="char">📜 角色卡</span>
      <span class="nav-tab" data-tab="history">📋 历史</span>
    </nav>
    <div style="flex:1"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="mode-badge coc" id="modeBadge" title="点击切换模式">COC</span>
      <div class="divider"></div>
      <button class="btn" id="btnExport">导出</button>
      <button class="btn" id="btnImport">导入</button>
      <input type="file" id="importFile" accept=".json" class="hidden">
    </div>
  </div>

  <div id="fbMobileOverlay" class="fb-mobile-overlay"></div>
  <div id="fb-layout">
    <!-- Sidebar -->
    <div id="fb-sidebar">
      <!-- Header: room name + KP badge + status dot + leave -->
      <div class="fb-sb-hdr">
        <span class="fb-crown hidden" id="fbSbCrown">♛</span>
        <span class="fb-sb-room-name disconnected" id="fbSbRoomName">未连接</span>
        <span class="fb-kp-hdr-badge hidden" id="fbSbKpBadge">KP</span>
        <span class="fb-sb-dot" id="fbSbDot"></span>
        <button class="fb-hdr-leave" id="btnFbLeave" title="离开房间">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7"/>
            <polyline points="17 15 20 12 17 9"/>
            <line x1="20" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
      <!-- Scrollable body -->
      <div class="fb-sb-body">
        <!-- Join section: shown when disconnected -->
        <div class="fb-join-section" id="fbJoinSection">
          <input class="fb-join-input" id="fbRoomInput" placeholder="房间 ID (字母/数字/_)" maxlength="20">
          <input class="fb-join-input" id="fbNameInput" placeholder="玩家名..." maxlength="16">
          <button class="fb-join-btn" id="btnFbJoin">加入房间</button>
          <div class="fb-join-hint">与队友使用相同的房间号</div>
        </div>
        <!-- Channel list: shown when connected -->
        <div class="hidden" id="fbChSection">
          <div class="fb-ch-section-hdr">
            <span class="fb-ch-sec-lbl"># 文字频道</span>
            <button class="fb-ch-add-btn" id="fbChAddBtn" title="新建频道 (仅KP)">+</button>
          </div>
          <input class="fb-ch-create-inp" id="fbNewChInput" placeholder="频道名，回车确认..." maxlength="16">
          <div id="fbChList"></div>

        </div>
        <!-- Member list: shown when connected -->
        <div class="hidden" id="fbMbrSection">
          <div class="fb-mbr-section-hdr" id="fbMbrToggle">
            <span class="fb-mbr-sec-lbl" id="fbMbrSecLbl">成员列表</span>
          </div>
          <div id="fbMembersList"></div>
        </div>
      </div><!-- /fb-sb-body -->
      <!-- Footer: current char + leave button -->
      <div class="fb-sb-footer hidden" id="fbSbFooter">
        <div class="fb-sb-avatar" id="fbSbAvatar">?</div>
        <div class="fb-sb-char-info">
          <div class="fb-sb-char-name" id="fbSbCharName">-</div>
          <div class="fb-sb-char-ch" id="fbSbCharCh"># general</div>
        </div>
        <span class="fb-sb-kp-tag hidden" id="fbSbKpTag">KP</span>
      </div>
    </div><!-- /fb-sidebar -->

    <div id="main">
    <!-- DICE TAB -->
    <div class="tab-panel active" id="tab-dice">
      <div class="game-layout">
        <!-- LEFT: dice interface -->
        <div class="game-left">
          <!-- Skill check arena (COC only) -->
          <div class="skill-arena" id="skillCheckArena">
            <div class="ornament">技能判定骰子台</div>
            <div class="sk-check-ctrl">
              <div class="sk-ctrl-group" style="flex:1;min-width:0">
                <span class="sk-ctrl-lbl">选择技能</span>
                <select class="sel" id="skillCheckSel" style="width:100%"></select>
              </div>
              <select class="ca-adv-sel" id="skillCheckAdv" style="align-self:flex-end;margin-bottom:3px">
                <option value="normal">正常</option>
                <option value="b1">奖励 ×1</option>
                <option value="b2">奖励 ×2</option>
                <option value="b3">奖励 ×3</option>
                <option value="p1">惩罚 ×1</option>
                <option value="p2">惩罚 ×2</option>
                <option value="p3">惩罚 ×3</option>
              </select>
            </div>
            <div class="sk-judge-btn-row">
              <button class="ca-judge-btn" id="btnSkillCheck" style="width:100%;margin-bottom:12px">判定</button>
            </div>
            <div id="skillCheckResult"><div class="empty">选择技能后点击判定</div></div>
          </div>
          <!-- Combat arena (COC only) -->
          <div class="skill-arena hidden" id="combatArena">
            <div class="ornament">战斗及伤害判定</div>
            <div id="caContent"></div>
          </div>
          <div class="dice-arena">
            <div class="ornament">自由骰子台</div>
            <div class="dice-grid" id="diceGrid"></div>
            <div class="roll-row">
              <button class="ca-judge-btn" id="btnRoll" style="flex:none;padding:0 28px;height:44px;font-size:14px;letter-spacing:1px">投掷骰子</button>
              <button class="btn" id="btnClear" style="padding:5px 12px">清空</button>
              <label style="font-size:12px;color:var(--dim);display:flex;align-items:center;gap:5px;cursor:pointer">
                <input type="checkbox" id="chkD100"> D100 (D10%+D10)
              </label>
            </div>
          </div>
          <div id="diceResults"><div class="empty">选择骰子数量后点击「投掷」</div></div>
        </div>
        <!-- RIGHT: character panel -->
        <div class="game-right" id="charPanel"></div>
      </div>
    </div>

    <!-- CHAR CARD TAB -->
    <div class="tab-panel" id="tab-char">
      <div class="tab-scroll">
        <div class="cp-char-mgr" style="margin-bottom:14px">
          <div class="sk-ctrl-group" style="flex:1;min-width:0">
            <span class="sk-ctrl-lbl">当前角色</span>
            <select class="sel" id="charSelect" style="width:100%"></select>
          </div>
          <button class="btn primary" id="btnNew">＋新建</button>
          <button class="btn danger" id="btnDel">删除</button>
        </div>
        <div class="import-box">
          <textarea id="importText" placeholder="粘贴角色卡文本，点击「解析」自动填充属性和技能。&#10;&#10;支持无分隔符格式：力量55敏捷75意志70体质50外貌80教育90体型60智力95幸运50&#10;技能格式：心理学80侦查63话术80图书馆60聆听70…"></textarea>
          <div class="import-actions">
            <button class="btn primary" id="btnParse">⚡ 解析</button>
            <button class="btn" id="btnToggleMode">切换模式</button>
            <span class="import-hint">支持中英文 · 无分隔符 · 自动识别技能</span>
          </div>
        </div>
        <div id="charCardArea"></div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="tab-panel" id="tab-history">
      <div class="tab-scroll">
        <div class="sec-header">
          <span class="sec-title">投掷历史</span>
          <button class="btn danger" id="btnClearHist">清空</button>
        </div>
        <div class="hist-list" id="histList"></div>
      </div>
    </div>
  </div>
  </div><!-- /fb-layout -->

  <div id="fb-toast-wrap"></div>

  <div id="overlay-mad">
    <div class="mad-title">永久疯狂</div>
    <div class="mad-sub">SAN 值归零<br>探索者已永久失去理智</div>
    <button class="btn" onclick="document.getElementById('overlay-mad').classList.remove('show')">关闭</button>
  </div>
</div>

<script>
'use strict';
const uid=()=>Math.random().toString(36).slice(2,10);
const fl=Math.floor;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

const prefersReducedMotion=()=>window.matchMedia('(prefers-reduced-motion:reduce)').matches;

function animateDmgCounter(el,target){
  if(prefersReducedMotion()){el.textContent=target+' 伤害';return;}
  const dur=500,start=Date.now();
  const tick=()=>{
    const t=(Date.now()-start)/dur;
    if(t>=1){
      el.textContent=target+' 伤害';
      el.style.transition='transform .2s';el.style.transform='scale(1.15)';
      setTimeout(()=>{el.style.transform='scale(1)';},200);
      return;
    }
    el.textContent=Math.round((1-Math.pow(1-t,3))*target)+' 伤害';
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function triggerResultCardAnim(el){
  if(prefersReducedMotion())return;
  // Force reflow to replay animation when already showing
  const cls=el.className;
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='';
}

/* ===== PARSER ===== */
function parseChar(text,mode){
  const res={};
  // Build a regex that matches: alias + optional separator + digits
  // Supports both 力量55 (no sep) and 力量:55 or 力量 55 (with sep)
  const tryMatch=(aliases)=>{
    for(const alias of aliases){
      const e=alias.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const m=text.match(new RegExp(e+'\\s*[:：=\\s]?\\s*(\\d+)','i'));
      if(m)return parseInt(m[1]);
    }
    return null;
  };

  if(mode==='COC'){
    const MAP={
      STR:['str','力量'],CON:['con','体质'],SIZ:['siz','体型'],
      DEX:['dex','敏捷'],APP:['app','外貌'],INT:['int','智力','灵感'],
      POW:['pow','意志'],EDU:['edu','教育'],LCK:['lck','幸运','luck'],
    };
    for(const[k,aliases]of Object.entries(MAP)){
      const v=tryMatch(aliases);
      if(v!==null)res[k]=v;
    }
    // SAN from 理智
    const sm=text.match(/理智\s*[:：=\s]?\s*(\d+)/);
    if(sm)res._SAN=parseInt(sm[1]);
    // Mythos
    const mm=text.match(/克苏鲁(?:神话)?\s*[:：=\s]?\s*(\d+)/);
    if(mm)res.cthulhuMythos=parseInt(mm[1]);
    // Skills
    res._skills=parseCOCSkills(text);
  }else{
    const MAP={
      STR:['str','力量'],DEX:['dex','敏捷'],CON:['con','体质'],
      INT:['int','智力'],WIS:['wis','感知'],CHA:['cha','魅力'],
    };
    for(const[k,aliases]of Object.entries(MAP)){
      const v=tryMatch(aliases);
      if(v!==null)res[k]=v;
    }
    const cm=text.match(/(?:职业|class)\s*[:：=\s]\s*([^\s\d,，\n]{1,10})/i);
    if(cm)res.class=cm[1];
    const lm=text.match(/(?:等级|lv(?:el)?)\s*[:：=\s]\s*(\d+)/i);
    if(lm)res.level=parseInt(lm[1]);
    const hm=text.match(/(?:hp|生命)\s*[:：=\s]\s*(\d+)/i);
    if(hm)res.HP=parseInt(hm[1]);
    const am=text.match(/(?:ac|护甲)\s*[:：=\s]\s*(\d+)/i);
    if(am)res.AC=parseInt(am[1]);
    const spm=text.match(/(?:speed|速度)\s*[:：=\s]\s*(\d+)/i);
    if(spm)res.speed=parseInt(spm[1]);
  }
  return res;
}

function parseCOCSkills(text){
  const pat=new RegExp(
    '('+COC_SKILL_NAMES.map(s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')'+'(\\d+)',
    'g'
  );
  const skills=[],seen=new Set();
  let m;
  while((m=pat.exec(text))!==null){
    const name=m[1],val=parseInt(m[2]);
    if(!seen.has(name)){
      seen.add(name);
      skills.push({id:uid(),name,base:val,prof:0,interest:0});
    }
  }
  return skills;
}

  const t=fl(Math.random()*10)*10,o=fl(Math.random()*10);
  return{tens:t,ones:o,total:(t===0&&o===0)?100:t+o};
}

/* ===== COC DERIVED VALUES ===== */
const cocDerived=c=>({
  hpMax:fl((c.CON+c.SIZ)/10),
  mpMax:fl(c.POW/5),
  sanMax:99-(c.cthulhuMythos||0),
});
function cocExtras(c){
  const s=(c.STR||0)+(c.SIZ||0);
  let db,build;
  if(s<=64){db='-2';build=-2;}
  else if(s<=84){db='-1';build=-1;}
  else if(s<=124){db='0';build=0;}
  else if(s<=164){db='+1D4';build=1;}
  else if(s<=204){db='+1D6';build=2;}
  else if(s<=284){db='+2D6';build=3;}
  else if(s<=364){db='+3D6';build=4;}
  else{db='+4D6';build=5;}
  const dexDodge=fl((c.DEX||0)/2);
  const dodgeSk=(c.skills||[]).find(s=>s.name==='闪避');
  const dodgeSkVal=dodgeSk?(dodgeSk.base||0)+(dodgeSk.prof||0)+(dodgeSk.interest||0):0;
  const dodge=Math.max(dexDodge,dodgeSkVal);
  return{db,build,dodge};
}
const dndMod=s=>fl((s-10)/2);
const dndProf=lv=>fl((lv-1)/4)+2;

/* ===== RENDER: HISTORY ===== */
function histGradeCls(g){
  if(!g)return'';
  if(g.includes('大成功'))return'cr-crit';
  if(g.includes('大失败'))return'cr-fumb';
  if(g.includes('极难'))return'cr-ext';
  if(g.includes('困难'))return'cr-hard';
  if(g==='成功')return'cr-ok';
  if(g==='失败')return'cr-fail';
  return'';
}
// Avatar color palette (Discord-style, per char/player)
const _histColors=['#5865f2','#eb459e','#57f287','#fee75c','#faa61a','#ed4245','#3ba55d','#9b59b6','#e67e22','#1abc9c'];
const _histColorMap={};
let _histColorIdx=0;
function _histColor(id){
  if(!_histColorMap[id]){_histColorMap[id]=_histColors[_histColorIdx%_histColors.length];_histColorIdx++;}
  return _histColorMap[id];
}

function renderHistory(){
  const el=document.getElementById('histList');
  if(!el)return;
  const raw=S.getHist();
  // KP channel filter pills (only when in a room as KP)
  const histTab=document.getElementById('tab-history');
  if(histTab){
    let filterRow=histTab.querySelector('.hist-filter-row');
    if(FB.isKP&&FB.roomId){
      const chIds=Object.keys(FB.channelList);
      if(chIds.length>1){
        if(!filterRow){filterRow=document.createElement('div');filterRow.className='hist-filter-row';histTab.prepend(filterRow);}
        const active=FB._histFilterCh;
        filterRow.innerHTML=`<button class="hist-filter-pill${!active?' active':''}" data-ch="">全部</button>`+
          chIds.sort((a,b)=>a==='general'?-1:b==='general'?1:a.localeCompare(b)).map(id=>{
            const meta=FB.channelList[id]||{displayName:id};
            const dot=`<span class="hist-ch-dot" style="background:${_chColor(id)}"></span>`;
            return`<button class="hist-filter-pill${active===id?' active':''}" data-ch="${esc(id)}">${dot}${esc(meta.displayName||id)}</button>`;
          }).join('');
        filterRow.querySelectorAll('.hist-filter-pill').forEach(pill=>{
          pill.addEventListener('click',()=>{
            FB._histFilterCh=pill.dataset.ch;
            renderHistory();
          });
        });
      }else if(filterRow){filterRow.remove();}
    }else if(filterRow){filterRow.remove();}
  }
  // Apply channel filter for KP
  const filterCh=FB.isKP?FB._histFilterCh:'';
  const filtered=filterCh?raw.filter(e=>e.channel===filterCh):raw;
  if(!filtered.length){el.innerHTML='<div class="hist-empty">暂无投掷历史</div>';return;}
  const h=[...filtered].reverse();
  const myCharId=App.char?App.char.id:'';
  let html='';
  let lastTs=0;
  for(const e of h){
    const ts=e.ts||Date.now();
    if(lastTs&&(ts-lastTs)>5*60*1000){
      const midTs=(lastTs+ts)/2;
      const d=new Date(midTs);
      const sepText=d.toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      html+=`<div class="hist-sep"><span class="hist-sep-line"></span><span class="hist-sep-time">${sepText}</span><span class="hist-sep-line"></span></div>`;
    }
    lastTs=ts;
    const cid=e.charId||'__unknown__';
    const cname=e.charName||'未知角色';
    const color=_histColor(cid);
    const isSelf=cid===myCharId&&!e.fromFB;
    const timeStr=new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    const diceArr=Array.isArray(e.dice)?e.dice:(e.dice?[e.dice]:[]);
    const diceHtml=diceArr.length?`<div class="hist-msg-dice">${diceArr.map(d=>`<span class="hist-die">${esc(String(d))}</span>`).join('')}</div>`:'';
    const results=e.results||[];
    const resHtml=results.length?results.map(r=>`<span class="hist-result-die">${Array.isArray(r)?r.join('|'):r}</span>`).join(''):'';
    const gradeHtml=e.grade?`<span class="hist-grade ${histGradeCls(e.grade)}">${esc(e.grade)}</span>`:'';
    const totalHtml=(e.total!==undefined&&e.total!==null)?`<span class="hist-msg-total">= ${e.total}</span>`:'';
    // Channel tag: show colored dot for KP multi-channel view
    let chHtml='';
    if(e.channel){
      const chMeta=FB.channelList[e.channel];
      const chLabel=chMeta?.displayName||e.channel;
      const dotStyle=`background:${_chColor(e.channel)}`;
      chHtml=`<span class="hist-msg-ch"><span class="hist-ch-dot" style="${dotStyle}"></span>${esc(chLabel)}</span>`;
    }
    html+=`<div class="hist-msg${isSelf?' hist-self':''}">
      <div class="hist-msg-avatar" style="background:${color}">${esc(cname[0]||'?')}</div>
      <div class="hist-msg-body">
        <div class="hist-msg-hdr">
          <span class="hist-msg-name" style="color:${color}">${esc(cname)}</span>${e.fromFB&&e.playerId&&e.playerId!==cname?`<span class="hist-player-id">@${esc(e.playerId)}</span>`:''}
          ${chHtml}
          <span class="hist-msg-time">${timeStr}</span>
        </div>
        ${e.label?`<div class="hist-msg-text">${esc(e.label)}</div>`:''}
        ${diceHtml}
        <div class="hist-msg-results">${resHtml}${gradeHtml}${totalHtml}</div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
  const scrollEl=el.closest('.tab-scroll');
  if(scrollEl)requestAnimationFrame(()=>{scrollEl.scrollTop=scrollEl.scrollHeight;});
}

function newWeapon(){return{id:uid(),name:'新武器',type:'',skill:'格斗：斗殴',penetrating:false,range:'',dmg:emptyWeaponDmg()};}

function getCombatSkillVal(char,skillLabel){
  const matchKey=COMBAT_SKILL_MATCH[skillLabel]||'';
  const sk=(char.coc.skills||[]).find(s=>s.name&&(s.name===matchKey||s.name.includes(matchKey)||matchKey.includes(s.name)));
  if(sk)return(sk.base||0)+(sk.prof||0)+(sk.interest||0);
  return COC_SKILL_DEFAULTS[matchKey]||0;
}

function dicesToStr(pool){
  const parts=[];
  for(const k of DMG_DIE_KEYS){if((pool[k]||0)>0)parts.push(`${pool[k]}${DMG_DIE_LABELS[k]}`);}
  return parts.join('+');
}

function rollDmgPool(pool){
  let total=0;const results=[];
  for(const k of DMG_DIE_KEYS){
    const n=pool[k]||0,s=DMG_DIE_SIDES[k];
    for(let i=0;i<n;i++){const v=fl(Math.random()*s)+1;total+=v;results.push(`${DMG_DIE_LABELS[k]}=${v}`);}
  }
  return{total,results};
}

/* ===== COC CHECK LOGIC ===== */
function cocGrade(roll,skVal){
  const hard=fl(skVal/2),ext=fl(skVal/5);
  const critMax=skVal>=50?5:1;
  if(roll<=critMax)return{grade:'大成功 ★',cls:'cr-crit'};
  if(roll>=96)return{grade:'大失败 ✕',cls:'cr-fumb'};
  if(roll<=ext)return{grade:'极难成功',cls:'cr-ext'};
  if(roll<=hard)return{grade:'困难成功',cls:'cr-hard'};
  if(roll<=skVal)return{grade:'成功',cls:'cr-ok'};
  return{grade:'失败',cls:'cr-fail'};
}

function doCOCCheck(skillVal,adv,char){
  const val=parseInt(skillVal)||0;
  if(!val)return null;
  const r1=fl(Math.random()*100)+1;
  let r2=null,final=r1;
  if(adv==='bonus'){r2=fl(Math.random()*100)+1;final=Math.min(r1,r2);}
  if(adv==='penalty'){r2=fl(Math.random()*100)+1;final=Math.max(r1,r2);}
  const hard=fl(val/2),ext=fl(val/5);
  const{grade,cls}=cocGrade(final,val);
  const detail=r2!=null?`${adv==='bonus'?'加骰':'减骰'}:[${r1},${r2}]→${final}`:`投掷:${final}`;
  S.pushHist({ts:Date.now(),label:`技能判定(${val})`,dice:[`D100=${final}`],total:final,grade,charId:char?.id,charName:char?.name});
  return{grade,cls,detail,val,hard,ext,final};
}

function showCOCCheckResult(res,container){
  if(!res||!container)return;
  container.className=`check-result-inline ${res.cls}`;
  container.innerHTML=`<span>${res.grade}</span><span class="cr-detail">技能:${res.val} ½:${res.hard} ⅕:${res.ext} | ${res.detail}</span>`;
}

/* ===== SFX (Web Audio API — no external files) ===== */
const SFX={
  _ctx:null,
  ctx(){
    if(!this._ctx){try{this._ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    return this._ctx;
  },
  _osc(f1,f2,dur,vol,type='sine'){
    const c=this.ctx();if(!c)return;
    const t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;
    o.frequency.setValueAtTime(f1,t);
    if(f2&&f2!==f1)o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o.stop(t+dur);
  },
  _chord(freqs,dur,vol,delay=70){
    freqs.forEach((f,i)=>setTimeout(()=>this._osc(f,f,dur,vol),i*delay));
  },
  _noise(dur,vol,bandFreq=2000){
    const c=this.ctx();if(!c)return;
    const t=c.currentTime;
    const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource();src.buffer=buf;
    const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=bandFreq;f.Q.value=0.6;
    const g=c.createGain();
    src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.start(t);src.stop(t+dur);
  },
  // Button sound variants
  tick(){this._osc(1400,900,0.045,0.07);},
  click(){this._osc(900,500,0.06,0.11);},
  primary(){this._osc(600,1000,0.07,0.13);setTimeout(()=>this._osc(1000,800,0.08,0.09),55);},
  danger(){this._osc(180,90,0.18,0.18,'sawtooth');},
  // Dice roll: noise burst + soft resolution ping
  roll(){
    this._noise(0.32,0.16,1800);
    setTimeout(()=>this._osc(520,660,0.18,0.1),280);
  },
  // Grade-specific sounds
  grade(g){
    if(!g)return;
    if(g.includes('大成功')){
      this._chord([523,659,784,1047],0.35,0.14,75);
    }else if(g.includes('大失败')){
      this._osc(220,70,0.45,0.2,'sawtooth');
      setTimeout(()=>this._noise(0.15,0.08,400),120);
    }else if(g.includes('极难')){
      this._osc(880,1100,0.15,0.12);
      setTimeout(()=>this._osc(1100,880,0.15,0.1),120);
    }else if(g.includes('困难')){
      this._osc(660,740,0.18,0.11);
    }else if(g.includes('成功')){
      this._osc(520,580,0.14,0.1);
    }else if(g.includes('失败')){
      this._osc(260,200,0.22,0.14);
    }
  },
};

// Global click sound dispatcher
document.addEventListener('click',e=>{
  const t=e.target;
  const btn=t.closest('.btn,.roll-btn,.nav-tab,.die-shape,.dcb,.cp-adj,.mode-badge,.ca-counter-toggle,.cond-tag,.ca-mult-opt,.wcard-pen-toggle,.ca-ds,.prof-dot');
  if(!btn)return;
  if(btn.classList.contains('roll-btn'))return; // SFX.roll() called inside event handler
  if(btn.classList.contains('btn')){
    if(btn.classList.contains('danger'))SFX.danger();
    else if(btn.classList.contains('primary'))SFX.primary();
    else SFX.click();
  }else if(btn.classList.contains('die-shape')||btn.classList.contains('ca-ds')){
    SFX.tick();
  }else if(btn.classList.contains('dcb')||btn.classList.contains('cp-adj')){
    SFX.tick();
  }else{SFX.tick();}
},true);

  },

  setCount(key,delta){cnts[key]=clamp(cnts[key]+delta,0,20);this.updateCnt(key);},
  updateCnt(key){const el=document.getElementById(`cnt_${key}`);if(el)el.textContent=cnts[key];},

  doRoll(){
    const btn=document.getElementById('btnRoll');
    btn.disabled=true;setTimeout(()=>btn.disabled=false,700);
    SFX.roll();
    document.querySelectorAll('.die-inner').forEach(el=>{el.classList.remove('rolling');void el.offsetWidth;el.classList.add('rolling');});
    const isD100=document.getElementById('chkD100').checked;
    setTimeout(()=>{
      const res=document.getElementById('diceResults');
      const _animRes=(borderCls)=>{
        if(borderCls)res.className=borderCls;else res.className='';
        if(!prefersReducedMotion()){
          res.style.animation='none';void res.offsetWidth;
          res.style.animation='resultSlideIn .28s cubic-bezier(.34,1.56,.64,1) both';
        }
      };
      if(isD100){
        const{tens,ones,total}=rollD100();
        const tStr=tens===0?'00':String(tens);
        const tCls=tens===0?'res-min':tens===90?'res-max':'';
        const oCls=ones===0?'res-min':ones===9?'res-max':'';
        const borderCls=tens===90?'rc-gold':tens===0?'rc-red':'rc-blue';
        res.innerHTML=`<div class="res-header">D100 投掷结果</div>
          <div class="res-row">
            <span class="res-die ${tCls}">${tStr}</span><span class="res-lbl">D10%</span>
            <span style="color:var(--dim);font-size:18px;margin:0 4px">+</span>
            <span class="res-die ${oCls}">${ones}</span><span class="res-lbl">D10</span>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">${tStr} + ${ones}</div>
          <div class="res-total">总计: ${total}</div>`;
        _animRes(borderCls);
        S.pushHist({ts:Date.now(),label:'D100',dice:[`D10%=${tStr}`,`D10=${ones}`],total,charId:this.char?.id,charName:this.char?.name});
      }else{
        const any=DICE.some(dt=>cnts[dt.key]>0);
        if(!any){res.innerHTML='<div class="empty">请先选择骰子数量</div>';return;}
        let total=0,html='<div class="res-header">投掷结果</div>',histDice=[],histLbl=[];
        let hasMax=false,hasMin=false;
        for(const dt of DICE){
          const n=cnts[dt.key];if(!n)continue;
          histLbl.push(`${n}${dt.label}`);
          html+=`<div style="margin-bottom:6px"><span class="res-lbl" style="margin-right:7px">${dt.label}:</span><span style="display:inline-flex;flex-wrap:wrap;gap:6px">`;
          for(let i=0;i<n;i++){
            const val=rollDie(dt.sides,dt.isTens);
            const maxV=dt.isTens?90:(dt.sides===10?9:dt.sides);
            const minV=dt.isTens?0:(dt.sides===10?0:1);
            const cls=val===maxV?'res-max':val===minV?'res-min':'';
            if(cls==='res-max')hasMax=true;
            if(cls==='res-min')hasMin=true;
            const disp=dt.isTens&&val===0?'00':String(val);
            html+=`<span class="res-die ${cls}">${disp}</span>`;
            total+=val;histDice.push(`${dt.label}=${disp}`);
          }
          html+='</span></div>';
        }
        html+=`<div class="res-total">总计: ${total}</div>`;
        res.innerHTML=html;
        const borderCls=hasMax?'rc-gold':hasMin?'rc-red':'';
        _animRes(borderCls);
        S.pushHist({ts:Date.now(),label:histLbl.join('+'),dice:histDice,total,charId:this.char?.id,charName:this.char?.name});
      }
    },380);
  },

  adjustBar(char,type,delta){
    if(char.mode==='COC'){
      const prev=char.coc.SAN?.cur||0;
      if(type==='hp')char.coc.HP.cur=clamp((char.coc.HP.cur||0)+delta,0,char.coc.HP.max);
      else if(type==='mp')char.coc.MP.cur=clamp((char.coc.MP.cur||0)+delta,0,char.coc.MP.max);
      else if(type==='san'){
        const next=clamp(prev+delta,0,char.coc.SAN.max);
        const loss=prev-next;
        char.coc.SAN.cur=next;
        if(loss>0){
          const mad=char.coc.madness;
          if(loss>=5)mad.temporary=true;
          const now=Date.now();
          if(now-(mad.hourStart||0)>3600000){mad.sanLostThisHour=0;mad.hourStart=now;}
          mad.sanLostThisHour=(mad.sanLostThisHour||0)+loss;
          if(mad.sanLostThisHour>=fl(prev/5))mad.indefinite=true;
          if(next<=0)document.getElementById('overlay-mad').classList.add('show');
        }
      }
    }else{
      if(type==='hp')char.dnd.HP.cur=clamp((char.dnd.HP.cur||0)+delta,0,char.dnd.HP.max);
    }
    this.save();
    // Fast DOM update (no full re-render)
    this.updateBarDOM(char,type);
  },

  updateBarDOM(char,type){
    let cur,max,pct;
    if(char.mode==='COC'){
      if(type==='hp'){cur=char.coc.HP.cur;max=char.coc.HP.max;}
      else if(type==='san'){cur=char.coc.SAN.cur;max=char.coc.SAN.max;}
      else if(type==='mp'){cur=char.coc.MP.cur;max=char.coc.MP.max;}
    }else{
      if(type==='hp'){cur=char.dnd.HP.cur;max=char.dnd.HP.max;}
    }
    if(cur===undefined)return;
    pct=max>0?clamp(cur/max*100,0,100):0;
    const idMap={hp:'cpHpNums',san:'cpSanNums',mp:'cpMpNums'};
    const barMap={hp:'cpHpBar',san:'cpSanBar',mp:'cpMpBar'};
    const numsEl=document.getElementById(idMap[type]);
    const barEl=document.getElementById(barMap[type]);
    if(numsEl)numsEl.textContent=`${cur}/${max}`;
    if(barEl)barEl.style.width=pct+'%';
    // Update madness tags
    if(type==='san'&&char.mode==='COC'){
      const mad=char.coc.madness||{};
      const tmpEl=document.querySelector('.cond-tag[data-cond="temporary"]');
      if(tmpEl)tmpEl.classList.toggle('active',!!mad.temporary);
      const indefEl=document.querySelector('.cond-tag[data-cond="indefinite"]');
      if(indefEl)indefEl.classList.toggle('active',!!mad.indefinite);
      const sanOpt=document.querySelector('#skillCheckSel option[value="san"]');
      if(sanOpt)sanOpt.textContent=`⚕ SAN判定 (${char.coc.SAN?.cur??0})`;
    }
  },

  /* ---- SKILL CHECK PANEL ---- */
  refreshSkillCheck(){

  bindSkillCheck(char){
    const btn=document.getElementById('btnSkillCheck');
    if(!btn)return;
    const nb=btn.cloneNode(true);
    btn.parentNode.replaceChild(nb,btn);
    nb.innerHTML=`${DICE_OUTLINE_SVG} 判定`;
    const origHtml=nb.innerHTML;
    const _showSkResult=(el,cls,grade,detail)=>{
      const gradeColor={'cr-crit':'var(--gold)','cr-ext':'#c084fc','cr-hard':'#60a5fa','cr-ok':'var(--green)','cr-fail':'rgba(180,180,200,.8)','cr-fumb':'var(--red)'}[cls]||'var(--text)';
      const card=document.createElement('div');
      card.className=`sk-result-card ${cls}`;
      card.innerHTML=`<div class="sk-result-grade" style="color:${gradeColor}">${grade}</div><div class="sk-result-detail">${detail}</div>`;
      el.innerHTML='';el.appendChild(card);
      if(!prefersReducedMotion()){
        const ease='cubic-bezier(.34,1.56,.64,1)';
        if(cls==='cr-fumb')card.style.animation=`resultSlideIn .2s ease both,resultShake .4s ease .18s both`;
        else if(cls==='cr-ext')card.style.animation=`resultSlideIn .3s ${ease} both,gradeExtPulse .85s ease .32s 2`;
        else if(cls==='cr-hard')card.style.animation=`resultSlideIn .3s ${ease} both,gradeHardPulse .85s ease .32s 2`;
        else card.style.animation=`resultSlideIn .3s ${ease} both`;
        const g=card.querySelector('.sk-result-grade');
        if(g)g.style.animation=`resultGradeBounce .42s ${ease} .07s both`;
      }
    };
    nb.addEventListener('click',()=>{
      if(nb.disabled)return;
      const sel=document.getElementById('skillCheckSel');
      const advSel=document.getElementById('skillCheckAdv');
      const v=sel.value;
      const adv=advSel?.value||'normal';
      const bonusN=adv.startsWith('b')?parseInt(adv[1]):0;
      const penaltyN=adv.startsWith('p')?parseInt(adv[1]):0;
      const ones=fl(Math.random()*10);
      const extraCount=Math.max(bonusN,penaltyN);
      const tensArr=[fl(Math.random()*10)*10];
      for(let i=0;i<extraCount;i++)tensArr.push(fl(Math.random()*10)*10);
      let tens;
      if(bonusN>0)tens=Math.min(...tensArr);
      else if(penaltyN>0)tens=Math.max(...tensArr);
      else tens=tensArr[0];
      const roll=(tens===0&&ones===0)?100:tens+ones;
      const tensDisp=tensArr.map(t=>t===0?'00':String(t)).join(',');
      const advNote=adv!=='normal'?` [十位:${tensDisp} 个位:${ones}]`:'';
      SFX.roll();
      const el=document.getElementById('skillCheckResult');
      const ATTR_NAMES={STR:'力量',DEX:'敏捷',CON:'体质',INT:'智力',POW:'意志',APP:'外貌',SIZ:'体型',EDU:'教育',LCK:'幸运'};
      if(v==='san'){
        const sanCur=char.coc.SAN?.cur??0;
        const ok=roll<=sanCur;
        const cls=ok?'cr-ok':'cr-fumb';
        _showSkResult(el,cls,ok?'✓ 成功':'✕ 失败',`SAN判定 — ${roll} / ${sanCur}${advNote}`);
        setTimeout(()=>SFX.grade(ok?'成功':'失败'),320);
        S.pushHist({ts:Date.now(),label:'SAN判定',dice:[`D100=${roll}`],total:roll,grade:ok?'成功':'失败',charId:char?.id,charName:char?.name});
      }else if(v.startsWith('attr:')){
        const parts=v.split(':'),attrKey=parts[1],attrVal=parseInt(parts[2])||0;
        const attrName=ATTR_NAMES[attrKey]||attrKey;
        const{grade,cls}=cocGrade(roll,attrVal);
        _showSkResult(el,cls,grade,`${attrName}(${attrKey}) — ${roll} / ${attrVal}${advNote}`);
        setTimeout(()=>SFX.grade(grade),320);
        S.pushHist({ts:Date.now(),label:`${attrName}判定`,dice:[`D100=${roll}`],total:roll,grade,charId:char?.id,charName:char?.name});
      }else if(v.startsWith('sk:')){
        const parts=v.split(':'),sid=parts[1],skVal=parseInt(parts[2])||0;
        const sk=(char.coc.skills||[]).find(s=>s.id===sid);
        const skName=sk?sk.name:'技能';
        const{grade,cls}=cocGrade(roll,skVal);
        _showSkResult(el,cls,grade,`${esc(skName)} — ${roll} / ${skVal}${advNote}`);
        setTimeout(()=>SFX.grade(grade),320);
        S.pushHist({ts:Date.now(),label:`${skName}判定`,dice:[`D100=${roll}`],total:roll,grade,charId:char?.id,charName:char?.name});
      }
      startCooldown(nb,3,origHtml);
      renderHistory();
    });
  },

function calcMaxDmg(pool){
  let t=0;for(const k of DMG_DIE_KEYS)t+=(pool[k]||0)*DMG_DIE_SIDES[k];return t;
}

/* ===== DAMAGE FORMULA PREVIEW ===== */
function buildDmgPreview(d){
  const parts=[];
  DMG_DIE_KEYS.forEach(k=>{const n=(d.baseDice[k]||0);if(n)parts.push(`${n}${DMG_DIE_LABELS[k]}`);});
  const baseStr=parts.length?parts.join('+'):'—';
  const dbParts=[];
  DMG_DIE_KEYS.forEach(k=>{const n=(d.dbDice[k]||0);if(n)dbParts.push(`${n}${DMG_DIE_LABELS[k]}`);});
  const ml=d.dbMult===0.5?'½×':d.dbMult===1.5?'1½×':'';
  const dbStr=dbParts.length?`DB(${ml}${dbParts.join('+')})`:'+0';
  const fix=d.fixedBonus||0;
  return`${baseStr} + ${dbStr}${fix?` ${fix>0?'+':''}${fix}`:''}`;
}

/* ===== COOLDOWN UTILITY ===== */
function startCooldown(btn,secs,origHtml){
  if(!btn||btn.disabled)return;
  const R=10,C=2*Math.PI*R;
  btn.disabled=true;btn.classList.add('cd-active');
  const start=Date.now(),total=secs*1000;
  let lastTick=-1;
  const tick=()=>{
    const elapsed=Date.now()-start;
    if(elapsed>=total){
      btn.disabled=false;btn.classList.remove('cd-active');btn.innerHTML=origHtml;return;
    }
    const remaining=Math.ceil((total-elapsed)/1000);
    const offset=(C*(elapsed/total)).toFixed(1);
    if(remaining!==lastTick){
      lastTick=remaining;
      btn.innerHTML=`${remaining}<svg class="roll-cd-ring" width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="${R}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset}"/></svg>`;
    }else{
      const c=btn.querySelector('.roll-cd-ring circle');
      if(c)c.setAttribute('stroke-dashoffset',offset);
    }
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

              <option value="b1">奖励×1</option><option value="b2">奖励×2</option><option value="b3">奖励×3</option>
              <option value="p1">惩罚×1</option><option value="p2">惩罚×2</option><option value="p3">惩罚×3</option>

          </div>
          <div id="caSkillInfo" class="ca-skill-block"></div>

            <button class="ca-counter-btn" id="caIsCounter" title="反击：极难/大成功时按普通伤害结算">⚔ 反击</button>

    this._caUpdateSkillInfo(char,this._caSelIdx);
